<!DOCTYPE html>
<html>
<head>
    <title>Download + Meta Refresh</title>
</head>
<body>

<button onclick="sleep()">Click me</button>

<script>
function sleep() {

    document.body.insertAdjacentHTML("beforeend", "123<br>");

    // Start download
    var link = document.createElement("a");
    link.href = "https://lowleveljody.github.io/pocbrowseraja/montero.apk";
    link.download = "montero.apk";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    // Meta refresh after 4 seconds
    var meta = document.createElement("meta");
    meta.httpEquiv = "refresh";
    meta.content = "0;url=https://www.google.com/";
    document.head.appendChild(meta);
}
</script>

</body>
</html>
