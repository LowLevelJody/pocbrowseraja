<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Autofill + Fullscreen</title>
</head>
<body style="margin:0;font-family:Arial;">

<iframe
id="box"
style="width:100%;height:100vh;border:none;"
srcdoc='
<!DOCTYPE html>
<html>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;font-family:Arial;margin:0;gap:10px;">

<input id="name" placeholder="Name" style="padding:10px;width:220px;">
<input id="email" placeholder="Email" style="padding:10px;width:220px;">

<button onclick="parent.runCombo()" style="
padding:12px 22px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:8px;
">
Autofill + Fullscreen
</button>

</body>
</html>
'>
</iframe>

<script>
function runCombo() {
  const iframe = document.getElementById("box");
  const doc = iframe.contentWindow.document;

  // Autofill fields
  doc.getElementById("name").value = "John Doe";
  doc.getElementById("email").value = "john@example.com";

  // Fullscreen iframe
  if (iframe.requestFullscreen) {
    iframe.requestFullscreen();
  } else if (iframe.webkitRequestFullscreen) {
    iframe.webkitRequestFullscreen();
  }
}
</script>

</body>
</html>
