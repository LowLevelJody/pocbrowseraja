<!DOCTYPE html>
<html>
<head>
<title>Alert + Meta Refresh</title>
</head>
<body>

<a href="https://example.com" onclick="run(); return false;">Click me</a>

<script>
function run() {

    // show alert
    alert(1);

    // create meta refresh
    var meta = document.createElement("meta");
    meta.httpEquiv = "refresh";
    meta.content = "0;url=https://example.com";
    document.head.appendChild(meta);

}
</script>

</body>
</html>
