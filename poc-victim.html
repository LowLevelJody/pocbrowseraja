<!DOCTYPE html>
<html>
<head>
<title>Picker + Meta Refresh</title>
</head>

<body>

<button onclick="start()">Open Folder</button>

<input type="file" id="picker" webkitdirectory multiple style="display:none">

<script>
function start() {

    // open Safari/WebKit folder picker
    document.getElementById("picker").click();

    // start meta refresh
    var meta = document.createElement("meta");
    meta.httpEquiv = "refresh";
    meta.content = "0; url=https://google.com";

    document.head.appendChild(meta);
}
</script>

</body>
</html>
