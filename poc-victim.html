
<!DOCTYPE html>
<html>
<body>


<a href="#" oncontextmenu="setTimeout(openAndReadFile,3200)" onclick="f()">Open file</a>

<script>
function f() {
    var meta = document.createElement("meta");
    meta.httpEquiv = "refresh";
    meta.content = "2;url=https://google.com";
    document.head.appendChild(meta);
}
</script>

<img id="myImageElement" width="300px" height="300px">
<script>




async function openAndReadFile() {
  try {
    // Options for the file picker, allowing selection of image files
    const pickerOpts = {
      types: [
        {
          description: "Images",
          accept: {
            "image/*": [".png", ".gif", ".jpeg", ".jpg"],
          },
        },
      ],
      excludeAcceptAllOption: false, 
      multiple: false, 
    };

   
    const [fileHandle] = await window.showOpenFilePicker(pickerOpts);

   
    const file = await fileHandle.getFile();

 
    const fileContent = await file.text(); 
     
    console.log("File Name:", file.name);
    console.log("File Content:", fileContent);

 
     const imageUrl = URL.createObjectURL(file);
     document.getElementById('myImageElement').src = imageUrl;

  } catch (error) {
    if (error.name === 'AbortError') {
      console.log('User cancelled the file picker.');
    } else {
      console.error('Error opening or reading file:', error);
    }
  }
}


</script>

</body>
</html>
