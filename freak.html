
<!doctype html>
<meta charset="utf-8">
<title>Edge download filename elision probe</title>
<style>
  body { margin: 32px; font: 16px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  button, a { font: inherit; padding: 10px 16px; }
  code { background: #f3f4f6; padding: 2px 5px; border-radius: 4px; }
</style>
<h1>Edge download filename elision probe</h1>
<p>
  Tests whether Edge download UI clearly shows the dangerous final extension for a long/confusable filename.
  The file content is harmless text.
</p>
<a id="download" download>Download harmless test file</a>
<p id="name"></p>
<script>
const longName = "Quarterly_security_report.pdf" + "_".repeat(120) + ".html";
const blob = new Blob([
  "Research-only Edge filename elision probe. This is not executable.\n",
  "Expected safe behavior: the download UI clearly exposes the final .html extension.\n"
], { type: "text/html" });
const a = document.getElementById("download");
a.href = URL.createObjectURL(blob);
a.download = longName;
document.getElementById("name").textContent = "Download attribute filename: " + longName;
</script>
