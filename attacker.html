<!DOCTYPE html>
<html>
<body style="margin:0;background:black;height:100vh;display:flex;justify-content:center;align-items:center;">

<button onclick="startAll()" style="font-size:28px;padding:20px 40px;">
START
</button>

<script>
async function startAll() {
  // fullscreen + spam copy together from one click
  document.documentElement.requestFullscreen().catch(() => {});

  let i = 0;

  const timer = setInterval(() => {
    navigator.clipboard.writeText("Spam Copy " + i).catch(() => {});
    i++;

    if (i >= 300) clearInterval(timer);
  }, 20);
}
</script>

</body>
</html>
