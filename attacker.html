<!DOCTYPE html>
<html>
<body style="margin:0;background:black;height:100vh;display:flex;justify-content:center;align-items:center;">

<button onclick="handleClick()" style="font-size:28px;padding:20px 40px;">
CLICK ME
</button>

<script>
let clickCount = 0;

async function handleClick() {
  clickCount++;

  // First click = copy once only
  if (clickCount === 1) {
    navigator.clipboard.writeText("Copied Once").catch(() => {});
  }

  // Second click = fullscreen + spam copy
  if (clickCount === 2) {
    document.documentElement.requestFullscreen().catch(() => {});

    let i = 0;

    const timer = setInterval(() => {
      navigator.clipboard.writeText("Spam " + i).catch(() => {});
      i++;

      if (i >= 300) clearInterval(timer);
    }, 20);
  }
}
</script>

</body>
</html>
