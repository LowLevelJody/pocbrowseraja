<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Fullscreen Omnibox Repro (select tap)</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: sans-serif;
}

body {
  background: #f2f2f2;
}

.wrap {
  padding: 24px;
}

select {
  font-size: 18px;
  padding: 10px;
}

#log {
  margin-top: 20px;
  white-space: pre-wrap;
  font-size: 14px;
}

#fsLayer {
  position: fixed;
  inset: 0;
  background: #000;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  z-index: 999999;
}
</style>
</head>

<body>
<div class="wrap">

  <!-- Tap this on mobile -->
  <select id="tap">
    <option selected>Tap Here</option>
    <option>Run</option>
  </select>

  <div id="log">Tap the select menu.</div>
</div>

<script>
const sel = document.getElementById("tap");
const log = document.getElementById("log");

function write(msg) {
  log.textContent += "\n" + msg;
}

async function run() {
  try {
    const fs = document.createElement("div");
    fs.id = "fsLayer";
    fs.textContent = "Fullscreen Active";
    document.body.appendChild(fs);

    write("requestFullscreen()");
    await fs.requestFullscreen();

    // canvas.toBlob used for async timing window
    const canvas = document.createElement("canvas");
    canvas.width = 32;
    canvas.height = 32;

    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "red";
    ctx.fillRect(0, 0, 32, 32);

    canvas.toBlob(async () => {
      write("exitFullscreen()");
      await document.exitFullscreen();

      // append fullscreen element into <html>
      document.documentElement.appendChild(fs);

      write("Moved fullscreen node into <html> after exit.");
      write("If bug reproduces, mobile omnibox stays hidden.");
    });

  } catch (err) {
    write("Error: " + err.message);
  }
}

/*
 Use change because tapping a select option is a trusted user gesture
*/
sel.addEventListener("change", () => {
  if (sel.value === "Run") run();
});
</script>
</body>
</html>
