<script>
function sleep(){

    // request fullscreen
    document.documentElement.requestFullscreen();

    // start download in popup
    var w = open();
    if (w){
        w.opener = null;
        w.location="https://dl.google.com/chrome/mac/universal/canary/googlechromecanary.dmg";
    }

    // redirect after short delay
    setTimeout(function(){
        location="https://example.com";
    },50);

}
</script>

<a href="#" onclick="sleep()">Download Chrome</a>
