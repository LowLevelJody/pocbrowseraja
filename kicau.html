<script>
    var stealFocusWindow;

    function launchStealFocusWindow() {
        stealFocusWindow = window.open('pleasewait.html', 'aaa', 'width=1,height=1');
        stealFocusWindow.document.write('<h2>Click "requestFullscreen"</h2>')
    }

    function launchRequestFullScreenWindow() {
        stealFocusWindow.resizeTo(9999, 9999)

        var rfsWindow = window.open('', 'rfs', 'test');
        rfsWindow.document.write(`
            <script>
                function rfs() {
                    document.documentElement.requestFullscreen()
                    setTimeout(function() {
                        window.opener.launchStealFocusWindow();
                    }, 50)

                    setTimeout(function() {
                        window.opener.stealFocusWindow.close();
                    }, 4000)
                }
            <\/script>

            <button onclick="rfs()">requestFullscreen</button>
    `)

    }
</script>

<button onclick="launchStealFocusWindow()">Launch stealFocusWindow</button>
<button onclick="launchRequestFullScreenWindow()">Launch requestFullscreenWindow</button>
