<html onclick=main()>

<script>
    function main() {

        var startCollison = setInterval(function () {
            pointerLockElement.requestPointerLock();
            fullscreenElement.appendChild(pointerLockElement)
        }, 1)

        fullscreenElement.requestFullscreen();

        setTimeout(function () {
            clearInterval(startCollison)
        }, 333)

    }
</script>


<div id="pointerLockElement"></div>

<div id="fullscreenElement">
</div>

</html>
