<!DOCTYPE html>
<html>

<head>
  <title>AAA Multi Trigger PoC</title>
</head>

<body onclick="run()">
<h2>Click anywhere</h2>

<script>
async function run() {
  // prevent re-trigger
  document.body.onclick = null;

  try {
    // ✅ FIRST: success copy
    await navigator.clipboard.writeText("SUCCESS");

    // ✅ FIRST: fullscreen
    await document.documentElement.requestFullscreen();

    console.log("Initial success");

    // 🔥 AAA STYLE: spam multiple clipboard calls
    for (let i = 0; i < 30; i++) {
      triggerFail(i);
    }

  } catch (e) {
    console.log("Error:", e);
  }
}

function triggerFail(i) {
  setTimeout(async () => {
    try {
      await navigator.clipboard.writeText("FAIL " + i);
      console.log("unexpected success", i);
    } catch (err) {
      console.log("fail", i);
    }
  }, i * 10); // rapid burst like your repeated execCommand
}
</script>

</body>
</html>
