<!DOCTYPE html>
<html>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial;">

<button onclick="start()">Verify</button>
<video id="vid" playsinline muted></video>

<script>
async function start() {
  // ✅ 1. Open popup FIRST (guaranteed by user gesture)
  const popup = window.open(
    "permission.html",
    "perm",
    "width=300,height=200"
  );

  const video = document.getElementById("vid");

  // Create fake UI canvas
  const canvas = document.createElement("canvas");
  canvas.width = 400;
  canvas.height = 500;
  const ctx = canvas.getContext("2d");

  function draw() {
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, 400, 500);

    ctx.fillStyle = "#000";
    ctx.font = "20px Arial";
    ctx.fillText("Secure Verification", 80, 120);
    ctx.fillText("Follow popup instructions", 50, 160);
  }

  draw();

  const stream = canvas.captureStream(30);
  video.srcObject = stream;

  // ✅ 2. WAIT for video to start, THEN request PiP
  video.onloadedmetadata = async () => {
    try {
      await video.play();
      await video.requestPictureInPicture();
    } catch (e) {
      console.log("PiP blocked:", e);
    }
  };
}
</script>

</body>
</html>
