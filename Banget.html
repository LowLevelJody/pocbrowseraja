<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PoC: Fake URL Bar + Fullscreen Spoof</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f4f8;
      padding: 20px;
    }
    h2 { font-size: 1.1em; color: #333; margin-bottom: 12px; }
    p  { font-size: 0.85em; color: #777; margin-bottom: 18px; line-height: 1.5; }
    .search-wrap {
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      padding: 10px 16px;
      gap: 10px;
      margin-bottom: 20px;
    }
    .search-wrap span { font-size: 1.2em; }
    #ta {
      border: none;
      outline: none;
      font-size: 16px;
      width: 100%;
      background: transparent;
      color: #222;
    }
    button {
      display: block;
      width: 100%;
      padding: 14px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
    }
    button:active { opacity: 0.85; }
    /* ── Fake URL bar ── */
    .fake-bar {
      position: fixed;
      left: 0;
      width: 100%;
      z-index: 99999;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      background: #f1f3f4;
      border-top: 1px solid #dadce0;
    }
    .fake-bar.show { opacity: 1; visibility: visible; }
    .fake-bar .lock { font-size: 13px; color: #188038; }
    .fake-bar .url  {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
      color: #202124;
      letter-spacing: 0.01em;
    }
    .fake-bar .reload { font-size: 16px; color: #5f6368; }
    /* spacers */
    .spacer { height: 900px; }
    .bottom-text { font-size: 18px; text-align: center; padding: 40px 20px; color: #555; }
    #middleTa {
      width: 100%;
      font-size: 16px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h2>🔍 Search or type a URL</h2>
  <p>Tap the search box or button to trigger fullscreen. The real browser URL bar disappears and a fake one takes its place above the keyboard.</p>
  <!-- Fake search bar (triggers the PoC) -->
  <div class="search-wrap">
    <span>🌐</span>
    <textarea id="ta" rows="1" placeholder="Search or type URL"></textarea>
  </div>
  <button id="showBtn">▶ Tap to focus + enter fullscreen</button>
  <!-- Fake URL bar — sits above virtual keyboard -->
  <div class="fake-bar" id="fakeBar">
    <span class="lock">🔒</span>
    <span class="url">google.com</span>
    <span class="reload">↻</span>
  </div>
  <div class="spacer"></div>
  <textarea id="middleTa" rows="3" placeholder="Middle textarea — tap to focus and trigger spoof too…"></textarea>
  <div class="spacer"></div>
  <div class="bottom-text">🎉 You scrolled all the way down!</div>
<script>
const fakeBar = document.getElementById('fakeBar');
const ta      = document.getElementById('ta');
const midTa   = document.getElementById('middleTa');
/* ── Position the fake bar just above the keyboard ── */
function positionBar() {
  const vv = window.visualViewport;
  if (!vv) return;
  const keyboardTop = vv.offsetTop + vv.height;   // pixels from top of layout
  fakeBar.style.top = (keyboardTop - fakeBar.offsetHeight) + 'px';
}
function showFakeBar() {
  fakeBar.classList.add('show');
  positionBar();
}
function hideFakeBar() {
  fakeBar.classList.remove('show');
}
/* ── Track viewport resize (keyboard open/close) ── */
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    const active = document.activeElement;
    if (active === ta || active === midTa) positionBar();
  });
  window.visualViewport.addEventListener('scroll', () => {
    const active = document.activeElement;
    if (active === ta || active === midTa) positionBar();
  });
}
/* ── Enter fullscreen, which hides the real browser chrome / URL bar ── */
async function enterFullscreen() {
  try {
    await document.documentElement.requestFullscreen({ navigationUI: 'hide' });
  } catch (e) {
    // Already fullscreen or denied — still show the fake bar
  }
}
/* ── Main trigger: fullscreen + show fake bar ── */
async function triggerSpoof(field) {
  field.focus();
  await enterFullscreen();
  // Small delay so the keyboard has time to animate up
  setTimeout(showFakeBar, 200);
}
/* ── Button ── */
document.getElementById('showBtn').addEventListener('click', () => triggerSpoof(ta));
/* ── Focus events ── */
ta.addEventListener('focus',    () => triggerSpoof(ta));
midTa.addEventListener('focus', () => triggerSpoof(midTa));
/* ── Blur events ── */
ta.addEventListener('blur',    hideFakeBar);
midTa.addEventListener('blur', hideFakeBar);
/* ── Exit fullscreen when keyboard dismissed ── */
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) hideFakeBar();
});
</script>
</body>
</html>
