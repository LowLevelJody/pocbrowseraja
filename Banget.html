<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>2-Step Video PiP</title>

<style>
body {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  background:#f0f0f0;
  font-family:Arial;
}

button {
  padding:10px 20px;
  background:#0dd438;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2 style="position:absolute;top:300px;">Site Verification Required</h2>
<button onclick="openPip()">Verify</button>

<video id="vid" playsinline muted style="display:none"></video>

<script>
let step = 0;

async function openPip() {
  const video = document.getElementById("vid");

  const canvas = document.createElement("canvas");
  canvas.width = 400;
  canvas.height = 300;
  const ctx = canvas.getContext("2d");

  function draw() {
    ctx.fillStyle = "#f0f0f0";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#000";
    ctx.font = "18px Arial";

    if (step === 0) {
      ctx.fillText("Click to Start 2-Step Verification", 40, 140);
    }

    if (step === 1) {
      ctx.fillText("Step 1:", 160, 80);
      ctx.fillText("Follow instructions", 120, 120);
      ctx.fillText("then press Confirm", 110, 150);
    }

    if (step === 2) {
      ctx.fillText("Step 2:", 160, 100);
      ctx.fillText("Verification Complete", 110, 140);
    }

    requestAnimationFrame(draw);
  }
  draw();

  const stream = canvas.captureStream(30);
  video.srcObject = stream;

  await video.play();
  await video.requestPictureInPicture();

  // 🔥 Interaction logic (simulate your buttons)
  document.addEventListener("keydown", handleKeys);
}

function handleKeys(e) {
  if (step === 0 && e.key === "Enter") {
    step = 1;

    // open popup like your original
    window.open("permission.html", "popupWindow", "width=100,height=100,left=850,top=650");
  }

  else if (step === 1 && e.key === "Enter") {
    step = 2;
  }

  else if (step === 2 && e.key === "Enter") {
    document.exitPictureInPicture();
  }
}
</script>

</body>
</html>
