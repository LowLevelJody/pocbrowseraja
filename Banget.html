<!DOCTYPE html>
<html>
<head>
  <title>tel + meta refresh PoC</title>

  <!-- Meta refresh to redirect -->
  <meta http-equiv="refresh" content="0;url=https://example.com">

  <script>
    function triggerTel() {
      // Trigger tel: scheme
      window.location.href = "tel:+1234567890";
    }

    window.onload = () => {
      // Small delay so both attempt to fire
      setTimeout(triggerTel, 0);
    };
  </script>
</head>
<body>
  <h1>Testing tel + meta refresh</h1>
</body>
</html>
