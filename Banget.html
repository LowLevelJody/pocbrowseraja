<!DOCTYPE html>
<html>
<head>
  <title>tel + redirect button</title>

  <script>
    function triggerBoth() {
      // Trigger tel:
      window.location.href = "tel:+1234567890";

      // Trigger redirect (acts like meta refresh)
      setTimeout(() => {
        window.location.href = "https://example.com";
      }, 50); // small delay so tel gets priority
    }
  </script>
</head>
<body>
  <h2>Test tel + redirect</h2>

  <button onclick="triggerBoth()">
    Click me
  </button>
</body>
</html>
