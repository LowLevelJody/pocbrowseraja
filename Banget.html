 <!doctype html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta id="refreshTag" http-equiv="refresh" content="" />
    <title>Tel + Redirect</title>
  </head>
  <body>
    <button id="callBtn">Call and Go</button>

    <script>
      document.getElementById("callBtn").addEventListener("click", function () {
        // after 2 seconds, redirect to https://jody.com
        document
          .getElementById("refreshTag")
          .setAttribute("content", "0;url=https://example.com");

        // trigger phone dialer
        window.location.href = "tel:+1234567890";
      });
    </script>
  </body>
  </html>
