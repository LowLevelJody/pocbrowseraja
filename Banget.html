<!DOCTYPE html>
<html>
<body>

<h1 id="msg">Chromium navigation test</h1>
<button id="run">run test</button>

<script>

document.getElementById("run").onclick = async function(){

    document.getElementById("msg").innerText = "opening popup";

    let popup = window.open("about:blank");

    await new Promise(r => setTimeout(r, 100));

    document.getElementById("msg").innerText = "navigating popup";

    popup.location.assign("https://example.com");

    await new Promise(r => setTimeout(r, 100));

    document.getElementById("msg").innerText = "navigating main page";

    location.assign("https://example.com");

};

</script>

</body>
</html>
