  `);

  log('Popup created with BroadcastChannel listener');

  const blob = new Blob([phishingHTML], { type: 'text/html' });

  const popup = window.open(blobURL);

    URL.revokeObjectURL(blobURL);

  log('Popup opened with blob URL');
  log('Blob URL format: blob:http://origin/uuid');

  log('Some browsers show the blob: prefix, others may not');
