<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verification Required</title>
<style>
body {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
  background:#f0f0f0;
}
button {
  padding:12px 20px;
  background:#0dd438;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
video {
  display:none;
}
</style>
</head>

<body>

<h2 style="position:absolute;top:200px;">Site Verification Required</h2>
<button onclick="start()">Verify</button>

<!-- Fake video container -->
<video id="vid" playsinline></video>

<script>
async function start() {
  const video = document.getElementById("vid");

  // Create canvas to simulate UI inside video
  const canvas = document.createElement("canvas");
  canvas.width = 400;
  canvas.height = 500;
  const ctx = canvas.getContext("2d");

  // Draw fake UI continuously (so it looks alive)
  function drawUI(step = 1) {
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#000";
    ctx.font = "20px Arial";

    if (step === 1) {
      ctx.fillText("Step 1: Verification", 80, 100);
      ctx.fillText("Click Continue below", 70, 140);

      ctx.fillStyle = "#0dd438";
      ctx.fillRect(100, 200, 200, 50);
      ctx.fillStyle = "#fff";
      ctx.fillText("Continue", 140, 235);
    } else {
      ctx.fillText("Step 2: Secure Login", 70, 100);
      ctx.fillText("Email:", 50, 160);
      ctx.fillText("Password:", 50, 220);

      ctx.strokeRect(150, 140, 180, 30);
      ctx.strokeRect(150, 200, 180, 30);

      ctx.fillStyle = "#4285f4";
      ctx.fillRect(100, 280, 200, 50);
      ctx.fillStyle = "#fff";
      ctx.fillText("Sign in", 150, 315);
    }
  }

  // Animate UI (simple step switch)
  let currentStep = 1;
  drawUI(currentStep);

  setTimeout(() => {
    currentStep = 2;
    drawUI(currentStep);
  }, 3000);

  // Capture canvas as stream
  const stream = canvas.captureStream(30);
  video.srcObject = stream;

  await video.play();
  await video.requestPictureInPicture();
}
</script>

</body>
</html>
