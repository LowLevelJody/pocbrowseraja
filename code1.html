<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Floating Window (PiP-like)</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; }

    #pip {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 320px;
      height: 180px;
      border: 3px solid #333;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      background: white;
      z-index: 9999;
      cursor: move;
    }
  </style>
</head>
<body>

<!-- Floating iframe window -->
<div id="pip">
  <iframe
    src="https://lowleveljody.github.io/pocbrowseraja/bangga.html"
    width="100%" height="100%"
    frameborder="0"
    allowfullscreen
  ></iframe>
</div>

<script>
  // make the pip draggable
  dragElement(document.getElementById("pip"));

  function dragElement(el) {
    let isDown = false;
    let offsetX, offsetY;

    el.addEventListener("mousedown", e => {
      isDown = true;
      offsetX = e.clientX - el.offsetLeft;
      offsetY = e.clientY - el.offsetTop;
    });

    document.addEventListener("mousemove", e => {
      if (!isDown) return;
      el.style.left = (e.clientX - offsetX) + "px";
      el.style.top  = (e.clientY - offsetY) + "px";
    });

    document.addEventListener("mouseup", () => {
      isDown = false;
    });
  }
</script>

</body>
</html>
