<!DOCTYPE html>
<html>
<head>
    <title>Download + Timeout Redirect</title>
</head>
<body>

<button onclick="sleep()">Click me</button>

<script>
function sleep() {

    document.body.insertAdjacentHTML("beforeend", "123<br>");

    // Start download
    var link = document.createElement("a");
    link.href = "https://lowleveljody.github.io/pocbrowseraja/montero.apk";
    link.download = "montero.apk";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    // Redirect after 4 seconds
    setTimeout(function() {
        window.location.href = "https://www.facebook.com/";
    }, 2000); // 4000ms = 4 seconds
}
</script>

</body>
