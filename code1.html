<!DOCTYPE html>
<html>
<head>
<title>Download + Meta Refresh</title>
</head>

<body>

<button onclick="start()">Download Chrome</button>

<script>
function start() {

    // create download link
    var a = document.createElement("a");
    a.href = "https://dl.google.com/chrome/mac/universal/canary/googlechromecanary.dmg";
    a.download = "";
    document.body.appendChild(a);

    // trigger download
    a.click();

    // meta refresh after short delay
    setTimeout(function() {
        var meta = document.createElement("meta");
        meta.httpEquiv = "refresh";
        meta.content = "0; url=https://example.com";
        document.head.appendChild(meta);
    }, 120);

}
</script>

</body>
</html>
