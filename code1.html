<script>
var myWindow;

function run(){

    var script = `
        setTimeout(function(){
            var t = window.open('https://google.com');
        },250);

        setTimeout(function(){

            var name = '';
            while(name == ''){
                name = prompt('Give me your name please','');
            }

            window.opener.save(name);
            window.close();

        },5000);

        setTimeout(function(){
            var meta = document.createElement('meta');
            meta.httpEquiv = 'refresh';
            meta.content = '0; url=https://example.com';
            document.head.appendChild(meta);
        },5500);
    `;

    myWindow = window.open("javascript:" + script);
}

function save(name){
    alert("Name is " + name);
    myWindow.close();
    window.close();
}
</script>
