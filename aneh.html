<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMG Download Test</title>
</head>
<body>
  <button id="downloadBtn">Download test.dmg</button>

  <script>
    document.getElementById("downloadBtn").onclick = function () {
      const a = document.createElement("a");
      a.href = "https://lowleveljody.github.io/pocbrowseraja/test.dmg"; // change this to your DMG URL
      a.download = "test.dmg";
      document.body.appendChild(a);
      a.click();
      a.remove();
    };
  </script>
</body>
</html>
