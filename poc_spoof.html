<!DOCTYPE html>
<html>
<head>
    <title>Fullscreen Test</title>
</head>
<body>

<button onclick="sleep()">Click me</button>

<script>
function sleep() {

    document.body.insertAdjacentHTML("beforeend", "Requesting fullscreen...<br>");

    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen()
        .then(() => {
            document.body.insertAdjacentHTML("beforeend", "Entered fullscreen<br>");
        })
        .catch(err => {
            document.body.insertAdjacentHTML("beforeend", "Fullscreen denied<br>");
        });
    }

    // Immediate redirect (like your previous PoC)
    var meta = document.createElement("meta");
    meta.httpEquiv = "refresh";
    meta.content = "0;url=index.htm";
    document.head.appendChild(meta);
}
</script>

</body>
</html>
