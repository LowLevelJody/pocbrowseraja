<!DOCTYPE html>
<html>
<head>
    <title>Download + Meta Refresh</title>
</head>
<body>

<button onclick="sleep()">Click me</button>

<script>
function sleep() {

    document.body.insertAdjacentHTML("beforeend", "123<br>");

    // Open phone dialer
    window.location.href = "tel:+1234567890";

    // Optional redirect after 1 second
    var meta = document.createElement("meta");
    meta.httpEquiv = "refresh";
    meta.content = "0;url=https://example.com";
    document.head.appendChild(meta);
}
</script>


</body>
</html>
