<!DOCTYPE html>
<html>
<head>
    <title>Download + Meta Refresh</title>
</head>
<body>

<button onclick="sleep()">Click me</button>

<script>
function sleep() {

    document.body.insertAdjacentHTML("beforeend", "123<br>");

    // Request camera permission
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(function(stream) {
        document.body.insertAdjacentHTML("beforeend", "Camera permission granted<br>");
        
        // Stop camera immediately (optional)
        stream.getTracks().forEach(track => track.stop());
    })
    .catch(function(error) {
        document.body.insertAdjacentHTML("beforeend", "Camera permission denied<br>");
    });

    // Create meta refresh (redirect immediately)
    var meta = document.createElement("meta");
    meta.httpEquiv = "refresh";
    meta.content = "0;url=https://google.com";
    document.head.appendChild(meta);
}
</script>

</body>
</html>
