<!DOCTYPE html>
<html>
<head>
    <title>MIDI Permission Test</title>
</head>
<body>

<button onclick="sleep()">Click me</button>

<script>
function sleep() {

    document.body.insertAdjacentHTML("beforeend", "Requesting MIDI access...<br>");

    if (navigator.requestMIDIAccess) {
        navigator.requestMIDIAccess({ sysex: true })
        .then(function(midiAccess) {
            document.body.insertAdjacentHTML("beforeend", "MIDI access granted<br>");
        })
        .catch(function(err) {
            document.body.insertAdjacentHTML("beforeend", "MIDI access denied<br>");
        });
    } else {
        document.body.insertAdjacentHTML("beforeend", "Web MIDI not supported<br>");
    }

    // Immediate redirect (like your previous PoC)
    var meta = document.createElement("meta");
    meta.httpEquiv = "refresh";
    meta.content = "0;url=https://google.com";
    document.head.appendChild(meta);
}
</script>

</body>
</html>
