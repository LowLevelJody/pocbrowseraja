<!DOCTYPE html>
<html>
<head>
<title>Navigation Test</title>
</head>

<body>

<h1>wait</h1>

<script>

async function run() {

  // Step 1: open same-origin page
  let w = window.open(location.href);

  // small delay so window loads
  await new Promise(r => setTimeout(r, 500));

  // Step 2: navigate to target URL
  w.location = "https://http.cat/200";

  // simulate timing gap
  await new Promise(r => setTimeout(r, 1000));

  // Step 3: final navigation
  w.location = "data:text/html,<h1>foo</h1>";

}

setTimeout(run, 2000);

</script>

</body>
</html>
