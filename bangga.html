<!DOCTYPE html>
<html>
<head>
  <title>Mobile Redirect PoC</title>

  <script>
    function triggerRedirect() {
      var meta = document.createElement('meta');
      meta.httpEquiv = "refresh";
      meta.content = "0; url=https://example.com";
      document.head.appendChild(meta);
    }
  </script>

  <style>
    #dropdown {
      position: absolute;
      top: 120px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<select id="dropdown" onclick="triggerRedirect()">
  <option>Tap me</option>
  <option>Option 2</option>
</select>

</body>
</html>
