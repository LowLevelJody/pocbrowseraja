<!DOCTYPE html>
<html>
<head>
  <title></title>

  <style>
    #dropdown {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
  </style>

  <script type='text/javascript'>
    function coverBubble() { 
      setTimeout(function() {
        window.scroll(0, 120);
        var dropdown = document.getElementById('dropdown');
        var event;
        event = document.createEvent('MouseEvents');
        event.initMouseEvent('mousedown', true, true, window);
        dropdown.dispatchEvent(event);
      }, 100);
    }

    document.addEventListener("scroll", coverBubble);

    function loaded() {
      coverBubble();
    }
  </script>
</head>

<body onload="loaded()">

<select class="input_panel" id="dropdown" onblur="coverBubble()" >
  <option value="1">https://google.com</option>
</select>
