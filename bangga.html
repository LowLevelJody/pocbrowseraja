<!DOCTYPE html>
<html>
<head>
  <title>Dropdown PoC</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;  /* center horizontally */
      align-items: flex-start;  /* move to top */
      padding-top: 20px;        /* little spacing from top */
      background: #111;
      color: white;
      font-family: Arial;
    }

    select {
      padding: 10px;
      font-size: 16px;
    }
  </style>

  <script>
    function triggerDropdown() {
      setTimeout(function () {
        var dropdown = document.getElementById('dropdown');

        var event = document.createEvent('MouseEvents');
        event.initMouseEvent('mousedown', true, true, window);

        dropdown.dispatchEvent(event);
      }, 200);
    }

    function loaded() {
      triggerDropdown();
    }

    document.addEventListener("scroll", triggerDropdown);
  </script>
</head>

<body onload="loaded()">

  <select id="dropdown" onblur="triggerDropdown()">
    <option value="0">first item</option>
    <option value="1">looooooooooooooooooooooooooooooooooooooooooooong item</option>
    <option value="2">item</option>
    <option value="3">item</option>
  </select>

</body>
</html>
