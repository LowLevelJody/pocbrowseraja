html{ 
    width:99999999px; height:9999999px;
}

/* Stretch the scrollbars so the corner connecting them will be huge */
::-webkit-scrollbar { 
    height: 999999px; width: 999999px;
}
::-webkit-scrollbar-corner {
    /* We can display actual images to the top and left */
    background-image: url('social.gif');
    background-position: bottom right;

	box-shadow: 0px 35px rgba(0,127,0,1),7px 7px rgba(0,127,0,1),7px 28px rgba(0,127,0,1),7px 35px rgba(0,0,0,1),7px 42px rgba(0,127,0,1),14px 0px rgba(0,127,0,1),14px 7px rgba(0,0,255,1),14px 28px rgba(0,127,0,1),14px 35px rgba(0,127,0,1),14px 42px rgba(0,0,0,1),21px 21px rgba(0,127,0,1),21px 28px rgba(0,0,0,1),21px 35px rgba(0,127,0,1),21px 42px rgba(0,0,0,1),28px 14px rgba(0,127,0,1),28px 21px rgba(0,0,0,1),28px 35px rgba(0,127,0,1),28px 42px rgba(0,0,0,1),35px 7px rgba(0,127,0,1),35px 35px rgba(0,127,0,1),35px 42px rgba(0,0,0,1),42px 0px rgba(0,127,0,1),42px 7px rgba(0,0,255,1),42px 28px rgba(0,127,0,1),42px 35px rgba(0,0,0,1);
}
</style>
